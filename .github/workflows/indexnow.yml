name: IndexNow + Sitemap Ping

on:
  push:
    branches: [main]
    paths:
      - "services/frontend/**"
  workflow_dispatch:

jobs:
  search-engine-notify:
    name: Notify Search Engines
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Ping Google Sitemap
        run: |
          echo "Pinging Google with updated sitemap..."
          HTTP_CODE=$(curl -s -o /dev/null -w "%{http_code}" \
            "https://www.google.com/ping?sitemap=https://stockandcryptotracker.com/sitemap.xml")
          echo "Google sitemap ping: HTTP $HTTP_CODE"

      - name: Push URLs to IndexNow
        run: |
          KEY="d41864d7353d4b0781f94fc09d9ba8c0"
          HOST="stockandcryptotracker.com"
          KEY_LOCATION="https://${HOST}/${KEY}.txt"

          URLS=(
            "https://${HOST}/en"
            "https://${HOST}/zh"
            "https://${HOST}/en/pricing"
            "https://${HOST}/en/faq"
            "https://${HOST}/en/blog"
            "https://${HOST}/en/blog/how-ai-stock-analysis-works"
            "https://${HOST}/en/blog/technical-indicators-explained"
            "https://${HOST}/en/docs"
            "https://${HOST}/en/smart-digest"
            "https://${HOST}/en/indicators"
            "https://${HOST}/en/about"
            "https://${HOST}/en/affiliate"
            "https://${HOST}/sitemap.xml"
            "https://${HOST}/llms.txt"
          )

          URLS_JSON=$(printf '%s\n' "${URLS[@]}" | jq -R . | jq -s .)

          PAYLOAD=$(jq -n \
            --arg host "$HOST" \
            --arg key "$KEY" \
            --arg keyLocation "$KEY_LOCATION" \
            --argjson urlList "$URLS_JSON" \
            '{host: $host, key: $key, keyLocation: $keyLocation, urlList: $urlList}')

          echo "Submitting ${#URLS[@]} URLs to IndexNow..."
          HTTP_CODE=$(curl -s -o /dev/null -w "%{http_code}" \
            -X POST "https://api.indexnow.org/indexnow" \
            -H "Content-Type: application/json" \
            -d "$PAYLOAD")

          if [ "$HTTP_CODE" = "200" ] || [ "$HTTP_CODE" = "202" ]; then
            echo "IndexNow accepted (HTTP $HTTP_CODE)"
          else
            echo "::warning::IndexNow returned HTTP $HTTP_CODE"
          fi
