# ===========================================
# Deploy Backend Services to Azure VM
# ===========================================
# ALL OPTIMIZATIONS APPLIED:
# Phase 1: Smart health polling, combined SSH
# Phase 2: GHA builds, BuildKit caching, compressed transfer, auto-fallback
# Phase 3: Selective builds (paths-filter), parallel matrix builds
#
# BASELINE (before optimization): ~8-12 min
# TARGET (Phase 3): ~3-5 min (60-70% faster)
# BEST CASE (config-only): ~1-2 min (skip all builds)
# ===========================================
# Services: n8n, Caddy, Metrics, Gateway 2.0, Alloy, Data Fetcher 2.0
# Monitoring: Grafana Cloud (via Alloy)
# Secrets: Injected at runtime via Infisical CLI (Machine Identity)
# Infrastructure Config: instruction/reference/infrastructure-config.md
# ===========================================

name: Deploy to Azure VM

on:
  push:
    branches: [main]
    paths:
      - "services/workers/data-fetcher-2.0/**"
      - "services/metrics/**"
      - "services/ai/gateway-2.0/**"
      - "services/back-office/**"
      - "services/mcp/**"
      - "services/common/**"
      - "deployment/vm/**"
      - ".github/workflows/deploy-vm.yml"
  workflow_dispatch:
    inputs:
      force_build:
        description: "Force rebuild all services (ignore change detection)"
        required: false
        default: "false"
        type: boolean
      rollback_service:
        description: "Service to rollback (leave empty for normal deploy)"
        required: false
        type: choice
        options:
          - ""
          - "data-fetcher-2.0"
          - "metrics"
          - "back-office"
          - "mcp-analysis"
          - "gateway-2.0"

jobs:
  # ===========================================
  # PHASE 3: Detect which services changed
  # ===========================================
  detect-changes:
    runs-on: ubuntu-latest
    outputs:
      datafetcher2: ${{ steps.filter.outputs.datafetcher2 }}
      metrics: ${{ steps.filter.outputs.metrics }}
      backoffice: ${{ steps.filter.outputs.backoffice }}
      mcp: ${{ steps.filter.outputs.mcp }}
      gateway2: ${{ steps.filter.outputs.gateway2 }}
      config: ${{ steps.filter.outputs.config }}
      any_service: ${{ steps.filter.outputs.datafetcher2 == 'true' || steps.filter.outputs.metrics == 'true' || steps.filter.outputs.backoffice == 'true' || steps.filter.outputs.mcp == 'true' || steps.filter.outputs.gateway2 == 'true' }}
      datafetcher2_version: ${{ steps.versions.outputs.datafetcher2 }}
      metrics_version: ${{ steps.versions.outputs.metrics }}
      backoffice_version: ${{ steps.versions.outputs.backoffice }}
      mcp_version: ${{ steps.versions.outputs.mcp }}
      gateway2_version: ${{ steps.versions.outputs.gateway2 }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Detect changed paths
        id: filter
        uses: dorny/paths-filter@v3
        with:
          filters: |
            datafetcher2:
              - 'services/workers/data-fetcher-2.0/**'
              - 'services/common/**'
            metrics:
              - 'services/metrics/**'
              - 'services/common/**'
            backoffice:
              - 'services/back-office/**'
            mcp:
              - 'services/mcp/**'
            gateway2:
              - 'services/ai/gateway-2.0/**'
            config:
              - 'deployment/vm/**'
              - '.github/workflows/deploy-vm.yml'

      - name: Log detected changes
        run: |
          echo "=========================================="
          echo "=== Detected Changes ==="
          echo "=========================================="
          echo "Data Fetcher 2.0: ${{ steps.filter.outputs.datafetcher2 }}"
          echo "Metrics: ${{ steps.filter.outputs.metrics }}"
          echo "Back Office: ${{ steps.filter.outputs.backoffice }}"
          echo "MCP Analysis: ${{ steps.filter.outputs.mcp }}"
          echo "Gateway 2.0: ${{ steps.filter.outputs.gateway2 }}"
          echo "Config: ${{ steps.filter.outputs.config }}"
          echo "Force Build: ${{ github.event.inputs.force_build }}"
          echo "Rollback Service: ${{ github.event.inputs.rollback_service }}"

          # Summary
          echo "## 🔍 Change Detection" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "| Service | Changed |" >> $GITHUB_STEP_SUMMARY
          echo "|---------|---------|" >> $GITHUB_STEP_SUMMARY
          echo "| Data Fetcher 2.0 | ${{ steps.filter.outputs.datafetcher2 }} |" >> $GITHUB_STEP_SUMMARY
          echo "| Metrics | ${{ steps.filter.outputs.metrics }} |" >> $GITHUB_STEP_SUMMARY
          echo "| Back Office | ${{ steps.filter.outputs.backoffice }} |" >> $GITHUB_STEP_SUMMARY
          echo "| MCP Analysis | ${{ steps.filter.outputs.mcp }} |" >> $GITHUB_STEP_SUMMARY
          echo "| Gateway 2.0 | ${{ steps.filter.outputs.gateway2 }} |" >> $GITHUB_STEP_SUMMARY
          echo "| Config | ${{ steps.filter.outputs.config }} |" >> $GITHUB_STEP_SUMMARY

      # Query current versions from DB (increment minor for new deploys)
      - name: Get versions from DB
        id: versions
        env:
          DB_REST_URL: ${{ secrets.DATABASE_URL_JS }}
          DB_REST_KEY: ${{ secrets.DATABASE_SERVICE_ROLE_KEY }}
        run: |
          echo "Querying current versions from DB..."

          # Service name mapping (workflow name -> DB service name)
          declare -A SERVICE_MAP=(
            ["datafetcher2"]="data-fetcher-2.0"
            ["metrics"]="metrics"
            ["backoffice"]="back-office"
            ["mcp"]="mcp-analysis"
            ["gateway2"]="gateway-2.0"
          )

          # Query all versions via PostgREST
          RESPONSE=$(curl -sf "${DB_REST_URL}/rest/v1/worker_versions?select=service,major_version,minor_version" \
            -H "apikey: ${DB_REST_KEY}" \
            -H "Authorization: Bearer ${DB_REST_KEY}")

          if [ -z "$RESPONSE" ]; then
            echo "::warning::Failed to query DB, using default versions"
            # Default to v1.0 for all services
            for key in "${!SERVICE_MAP[@]}"; do
              echo "${key}=1.0" >> $GITHUB_OUTPUT
            done
            exit 0
          fi

          echo "Raw response: $RESPONSE"

          # Parse and output new versions (current minor + 1)
          for key in "${!SERVICE_MAP[@]}"; do
            DB_NAME="${SERVICE_MAP[$key]}"

            # Extract version for this service using jq
            MAJOR=$(echo "$RESPONSE" | jq -r ".[] | select(.service == \"$DB_NAME\") | .major_version // 1")
            MINOR=$(echo "$RESPONSE" | jq -r ".[] | select(.service == \"$DB_NAME\") | .minor_version // 0")

            # Default if not found
            [ -z "$MAJOR" ] || [ "$MAJOR" == "null" ] && MAJOR=1
            [ -z "$MINOR" ] || [ "$MINOR" == "null" ] && MINOR=0

            # New version = current minor + 1
            NEW_MINOR=$((MINOR + 1))
            NEW_VERSION="${MAJOR}.${NEW_MINOR}"

            echo "${key}=${NEW_VERSION}" >> $GITHUB_OUTPUT
            echo "  $DB_NAME: v${MAJOR}.${MINOR} -> v${NEW_VERSION}"
          done

  # ===========================================
  # Run data-fetcher-2.0 unit tests before build
  # ===========================================
  test-datafetcher:
    needs: [detect-changes]
    if: needs.detect-changes.outputs.datafetcher2 == 'true' && github.event.inputs.rollback_service == ''
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-dotnet@v4
        with:
          dotnet-version: "8.0.x"
      - name: Run data-fetcher-2.0 tests
        working-directory: services/workers/data-fetcher-2.0
        run: dotnet test --verbosity normal

  # ===========================================
  # PHASE 3: Build only changed services (parallel)
  # ===========================================
  build:
    needs: [detect-changes, test-datafetcher]
    runs-on: ubuntu-latest
    if: |
      always() &&
      needs.test-datafetcher.result != 'failure' &&
      (needs.detect-changes.outputs.any_service == 'true' || github.event.inputs.force_build == 'true')
    outputs:
      build_success: ${{ steps.build-result.outputs.success }}
      images_built: ${{ steps.build-result.outputs.images }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      # Build Data Fetcher 2.0 (only if changed or forced)
      - name: Build Data Fetcher 2.0 image
        id: build-datafetcher2
        if: (needs.detect-changes.outputs.datafetcher2 == 'true' || github.event.inputs.force_build == 'true') && github.event.inputs.rollback_service == ''
        continue-on-error: true
        uses: docker/build-push-action@v5
        with:
          context: services/
          file: services/workers/data-fetcher-2.0/Dockerfile
          tags: stocktracker-data-fetcher-2.0:v${{ needs.detect-changes.outputs.datafetcher2_version }}
          cache-from: type=gha,scope=data-fetcher-2.0
          cache-to: type=gha,mode=max,scope=data-fetcher-2.0
          outputs: type=docker,dest=/tmp/data-fetcher-2.0.tar

      # Build Metrics (only if changed or forced)
      - name: Build Metrics image
        id: build-metrics
        if: (needs.detect-changes.outputs.metrics == 'true' || github.event.inputs.force_build == 'true') && github.event.inputs.rollback_service == ''
        continue-on-error: true
        uses: docker/build-push-action@v5
        with:
          context: services/
          file: services/metrics/StockTracker.Metrics/Dockerfile
          tags: stocktracker-metrics:v${{ needs.detect-changes.outputs.metrics_version }}
          cache-from: type=gha,scope=metrics
          cache-to: type=gha,mode=max,scope=metrics
          outputs: type=docker,dest=/tmp/metrics.tar

      # Build Back Office (only if changed or forced)
      - name: Build Back Office image
        id: build-backoffice
        if: (needs.detect-changes.outputs.backoffice == 'true' || github.event.inputs.force_build == 'true') && github.event.inputs.rollback_service == ''
        continue-on-error: true
        uses: docker/build-push-action@v5
        with:
          context: services/back-office/
          file: services/back-office/Dockerfile
          tags: stocktracker-back-office:v${{ needs.detect-changes.outputs.backoffice_version }}
          cache-from: type=gha,scope=backoffice
          cache-to: type=gha,mode=max,scope=backoffice
          outputs: type=docker,dest=/tmp/back-office.tar

      # Build MCP Analysis Server (only if changed or forced)
      - name: Build MCP Analysis image
        id: build-mcp
        if: (needs.detect-changes.outputs.mcp == 'true' || github.event.inputs.force_build == 'true') && github.event.inputs.rollback_service == ''
        continue-on-error: true
        uses: docker/build-push-action@v5
        with:
          context: services/mcp/
          file: services/mcp/Dockerfile
          tags: stocktracker-mcp-analysis:v${{ needs.detect-changes.outputs.mcp_version }}
          cache-from: type=gha,scope=mcp
          cache-to: type=gha,mode=max,scope=mcp
          outputs: type=docker,dest=/tmp/mcp-analysis.tar

      # Build Gateway 2.0 (TypeScript) (only if changed or forced)
      - name: Build Gateway 2.0 image
        id: build-gateway2
        if: (needs.detect-changes.outputs.gateway2 == 'true' || github.event.inputs.force_build == 'true') && github.event.inputs.rollback_service == ''
        continue-on-error: true
        uses: docker/build-push-action@v5
        with:
          context: services/ai/gateway-2.0/
          file: services/ai/gateway-2.0/Dockerfile
          tags: stocktracker-gateway-2.0:v${{ needs.detect-changes.outputs.gateway2_version }}
          cache-from: type=gha,scope=gateway2
          cache-to: type=gha,mode=max,scope=gateway2
          outputs: type=docker,dest=/tmp/gateway-2.0.tar

      # NOTE: Frontend Staging is NOT built on GHA
      # It must be built on VM with Infisical STAGING secrets (not Production)
      # The start-frontend-staging.sh script handles this during deploy

      # Compress built images
      - name: Compress Docker images
        id: compress
        run: |
          mkdir -p /tmp/images
          BUILT=""

          if [ -f /tmp/data-fetcher-2.0.tar ]; then
            gzip -1 < /tmp/data-fetcher-2.0.tar > /tmp/images/data-fetcher-2.0.tar.gz
            BUILT="${BUILT}datafetcher2,"
            echo "✅ Data Fetcher 2.0 compressed"
          else
            echo "⏭️ Data Fetcher 2.0 skipped (unchanged)"
          fi

          if [ -f /tmp/metrics.tar ]; then
            gzip -1 < /tmp/metrics.tar > /tmp/images/metrics.tar.gz
            BUILT="${BUILT}metrics,"
            echo "✅ Metrics compressed"
          else
            echo "⏭️ Metrics skipped (unchanged)"
          fi

          if [ -f /tmp/back-office.tar ]; then
            gzip -1 < /tmp/back-office.tar > /tmp/images/back-office.tar.gz
            BUILT="${BUILT}backoffice,"
            echo "✅ Back Office compressed"
          else
            echo "⏭️ Back Office skipped (unchanged)"
          fi

          if [ -f /tmp/mcp-analysis.tar ]; then
            gzip -1 < /tmp/mcp-analysis.tar > /tmp/images/mcp-analysis.tar.gz
            BUILT="${BUILT}mcp,"
            echo "✅ MCP Analysis compressed"
          else
            echo "⏭️ MCP Analysis skipped (unchanged)"
          fi

          if [ -f /tmp/gateway-2.0.tar ]; then
            gzip -1 < /tmp/gateway-2.0.tar > /tmp/images/gateway-2.0.tar.gz
            BUILT="${BUILT}gateway2,"
            echo "✅ Gateway 2.0 compressed"
          else
            echo "⏭️ Gateway 2.0 skipped (unchanged)"
          fi

          # NOTE: Frontend Staging is built on VM only (needs Infisical staging secrets)

          echo "built=$BUILT" >> $GITHUB_OUTPUT
          ls -lh /tmp/images/ 2>/dev/null || echo "No images to transfer"

      # Check build result
      - name: Check build result
        id: build-result
        run: |
          # Check if any images were actually built
          if ls /tmp/images/*.tar.gz 1>/dev/null 2>&1; then
            SUCCESS="true"
            IMAGES="${{ steps.compress.outputs.built }}"
            echo "✅ Build complete: $IMAGES"
          else
            SUCCESS="false"
            IMAGES=""
            echo "⚠️ No images built"
          fi

          echo "success=$SUCCESS" >> $GITHUB_OUTPUT
          echo "images=$IMAGES" >> $GITHUB_OUTPUT

      # Setup SSH for direct transfer (bypass artifact quota)
      - name: Setup SSH for direct transfer
        if: steps.build-result.outputs.success == 'true'
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.VM_SSH_PRIVATE_KEY }}" > ~/.ssh/id_rsa
          chmod 600 ~/.ssh/id_rsa
          cat >> ~/.ssh/config << 'SSHCONFIG'
          Host 20.17.176.1
            StrictHostKeyChecking no
            UserKnownHostsFile /dev/null
            LogLevel ERROR
          SSHCONFIG
          chmod 600 ~/.ssh/config

      # Transfer images directly via SCP (bypass GitHub artifact storage quota)
      - name: Transfer and load images directly
        if: steps.build-result.outputs.success == 'true'
        run: |
          echo "📤 Transferring images directly to VM (bypassing artifact storage)..."
          scp -o ServerAliveInterval=60 /tmp/images/*.tar.gz azureuser@20.17.176.1:/tmp/

          ssh -o ServerAliveInterval=60 azureuser@20.17.176.1 'bash -s' << 'EOF'
          set -e
          echo "📥 Loading Docker images..."

          # Create/update .env.versions file with version variables for docker-compose
          DEPLOY_PATH="/opt/stocktracker"
          ENV_FILE="$DEPLOY_PATH/.env.versions"

          # Preserve existing versions for services not being updated
          if [ -f "$ENV_FILE" ]; then
            cp "$ENV_FILE" "$ENV_FILE.bak"
          fi

          for NAME in data-fetcher-2.0 metrics back-office mcp-analysis gateway-2.0; do
            img="/tmp/${NAME}.tar.gz"
            if [ -f "$img" ]; then
              echo "Loading $NAME..."
              # Load and capture the loaded image info
              LOADED=$(gunzip -c "$img" | docker load | grep "Loaded image:" | sed 's/Loaded image: //')
              rm "$img"

              if [ -n "$LOADED" ]; then
                VERSION=$(echo "$LOADED" | cut -d: -f2)

                # Map service name to env var name
                case "$NAME" in
                  "data-fetcher-2.0") VAR_NAME="DATA_FETCHER_2_VERSION" ;;
                  "metrics") VAR_NAME="METRICS_VERSION" ;;
                  "back-office") VAR_NAME="BACK_OFFICE_VERSION" ;;
                  "mcp-analysis") VAR_NAME="MCP_ANALYSIS_VERSION" ;;
                  "gateway-2.0") VAR_NAME="GATEWAY_2_VERSION" ;;
                esac

                # Update or add version variable
                if [ -f "$ENV_FILE" ] && grep -q "^${VAR_NAME}=" "$ENV_FILE"; then
                  sed -i "s/^${VAR_NAME}=.*/${VAR_NAME}=${VERSION}/" "$ENV_FILE"
                else
                  echo "${VAR_NAME}=${VERSION}" >> "$ENV_FILE"
                fi

                echo "✅ $NAME loaded: $VERSION"
              else
                echo "⚠️ $NAME loaded but couldn't extract version"
              fi
            fi
          done

          echo "=== Current .env.versions ==="
          cat "$ENV_FILE" 2>/dev/null || echo "(empty)"

          echo ""
          echo "✅ Images loaded with versioned tags"
          docker images --format "table {{.Repository}}\t{{.Tag}}\t{{.Size}}" | grep stocktracker | head -20
          EOF

      # Log transfer metrics
      - name: Log transfer metrics
        run: |
          echo "## 📦 Build Summary" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY

          if ls /tmp/images/*.tar.gz 1>/dev/null 2>&1; then
            TOTAL_SIZE=$(du -ch /tmp/images/*.tar.gz 2>/dev/null | tail -1 | cut -f1 || echo "0")
            echo "| Image | Size | Status |" >> $GITHUB_STEP_SUMMARY
            echo "|-------|------|--------|" >> $GITHUB_STEP_SUMMARY

            for service in data-fetcher-2.0 metrics back-office mcp-analysis gateway-2.0; do
              if [ -f "/tmp/images/${service}.tar.gz" ]; then
                SIZE=$(du -h "/tmp/images/${service}.tar.gz" | cut -f1)
                echo "| $service | $SIZE | ✅ Built |" >> $GITHUB_STEP_SUMMARY
              else
                echo "| $service | - | ⏭️ Skipped |" >> $GITHUB_STEP_SUMMARY
              fi
            done

            echo "" >> $GITHUB_STEP_SUMMARY
            echo "**Total transfer**: $TOTAL_SIZE" >> $GITHUB_STEP_SUMMARY
          else
            echo "No images built (all skipped or failed)" >> $GITHUB_STEP_SUMMARY
          fi

          echo "" >> $GITHUB_STEP_SUMMARY
          echo "💡 Azure inbound transfer is FREE" >> $GITHUB_STEP_SUMMARY

  # ===========================================
  # Deploy to VM
  # ===========================================
  deploy:
    needs: [detect-changes, build, test-datafetcher]
    # Always run deploy (even if build was skipped for config-only changes)
    # But block if tests failed
    if: always() && !cancelled() && needs.test-datafetcher.result != 'failure'
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup SSH
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.VM_SSH_PRIVATE_KEY }}" > ~/.ssh/id_rsa
          chmod 600 ~/.ssh/id_rsa

          # Configure SSH to skip host key verification for our controlled VM
          # This is acceptable for CI/CD with a known, controlled server
          cat >> ~/.ssh/config << 'SSHCONFIG'
          Host 20.17.176.1
            StrictHostKeyChecking no
            UserKnownHostsFile /dev/null
            LogLevel ERROR
          SSHCONFIG
          chmod 600 ~/.ssh/config

      # NOTE: Images are now transferred directly from build job via SCP (bypasses artifact quota)
      # No artifact download needed - images are already loaded on VM
      - name: Verify images loaded (GHA build path)
        if: needs.build.outputs.build_success == 'true'
        run: |
          echo "=========================================="
          echo "=== Verifying GHA-built images on VM ==="
          echo "=========================================="
          echo "Images were transferred directly from build job (no artifact storage used)"

          ssh -o ServerAliveInterval=60 azureuser@20.17.176.1 'bash -s' << 'EOF'
          echo "Current Docker images:"
          docker images --format "table {{.Repository}}\t{{.Tag}}\t{{.Size}}" | grep stocktracker || echo "No stocktracker images yet"
          EOF

      # ===========================================
      # FALLBACK PATH: Build on VM if needed (selective)
      # ===========================================
      - name: Fallback - Build on VM
        if: |
          github.event.inputs.rollback_service == '' && (
            needs.build.result == 'failure' ||
            (needs.detect-changes.outputs.any_service == 'true' && needs.build.outputs.build_success != 'true')
          )
        env:
          DATA_FETCHER_2_CHANGED: ${{ needs.detect-changes.outputs.datafetcher2 }}
          METRICS_CHANGED: ${{ needs.detect-changes.outputs.metrics }}
          BACKOFFICE_CHANGED: ${{ needs.detect-changes.outputs.backoffice }}
          MCP_CHANGED: ${{ needs.detect-changes.outputs.mcp }}
          GATEWAY2_CHANGED: ${{ needs.detect-changes.outputs.gateway2 }}
          FORCE_BUILD: ${{ github.event.inputs.force_build }}
        run: |
          echo "::warning::GHA build failed or incomplete, falling back to VM build"
          echo "=========================================="
          echo "=== FALLBACK: Building on VM (selective) ==="
          echo "=========================================="

          # Build selective services list based on detected changes
          SERVICES=""
          [ "$DATA_FETCHER_2_CHANGED" == "true" ] || [ "$FORCE_BUILD" == "true" ] && SERVICES="$SERVICES data-fetcher-2.0"
          [ "$METRICS_CHANGED" == "true" ] || [ "$FORCE_BUILD" == "true" ] && SERVICES="$SERVICES metrics"
          [ "$BACKOFFICE_CHANGED" == "true" ] || [ "$FORCE_BUILD" == "true" ] && SERVICES="$SERVICES back-office"
          [ "$MCP_CHANGED" == "true" ] || [ "$FORCE_BUILD" == "true" ] && SERVICES="$SERVICES mcp-analysis"
          [ "$GATEWAY2_CHANGED" == "true" ] || [ "$FORCE_BUILD" == "true" ] && SERVICES="$SERVICES gateway-2.0"

          # Trim whitespace
          SERVICES=$(echo "$SERVICES" | xargs)

          if [ -z "$SERVICES" ]; then
            echo "No services to build"
            exit 0
          fi

          echo "Building services: $SERVICES"

          ssh -o ServerAliveInterval=60 azureuser@20.17.176.1 "bash -s" << EOF
          set -e
          DEPLOY_PATH="/opt/stocktracker"
          cd \$DEPLOY_PATH

          echo "📦 Building Docker services on VM (fallback mode)..."
          # NOTE: Frontend Staging is NOT built here - it's built separately with Infisical staging
          DOCKER_BUILDKIT=1 docker compose build $SERVICES

          echo "✅ VM build complete"
          EOF

      # ===========================================
      # ROLLBACK PATH: Rollback to previous version
      # ===========================================
      - name: Rollback service
        if: github.event.inputs.rollback_service != ''
        env:
          ROLLBACK_SERVICE: ${{ github.event.inputs.rollback_service }}
          DB_REST_URL: ${{ secrets.DATABASE_URL_JS }}
          DB_REST_KEY: ${{ secrets.DATABASE_SERVICE_ROLE_KEY }}
        run: |
          echo "=========================================="
          echo "=== ROLLBACK: $ROLLBACK_SERVICE ==="
          echo "=========================================="

          # Get current version from DB
          RESPONSE=$(curl -sf "${DB_REST_URL}/rest/v1/worker_versions?service=eq.${ROLLBACK_SERVICE}&select=major_version,minor_version" \
            -H "apikey: ${DB_REST_KEY}" \
            -H "Authorization: Bearer ${DB_REST_KEY}")

          MAJOR=$(echo "$RESPONSE" | jq -r '.[0].major_version // 1')
          MINOR=$(echo "$RESPONSE" | jq -r '.[0].minor_version // 0')

          if [ "$MINOR" -le 0 ]; then
            echo "::error::Cannot rollback - already at v${MAJOR}.0 (no previous version exists)"
            exit 1
          fi

          # Previous version = current minor - 1
          PREV_MINOR=$((MINOR - 1))
          PREV_VERSION="v${MAJOR}.${PREV_MINOR}"

          echo "Rolling back $ROLLBACK_SERVICE from v${MAJOR}.${MINOR} to ${PREV_VERSION}"

          # Docker image name mapping
            case "$ROLLBACK_SERVICE" in
              "data-fetcher-2.0") IMAGE="stocktracker-data-fetcher-2.0" ;;
            "metrics") IMAGE="stocktracker-metrics" ;;
            "back-office") IMAGE="stocktracker-back-office" ;;
            "mcp-analysis") IMAGE="stocktracker-mcp-analysis" ;;
            "gateway-2.0") IMAGE="stocktracker-gateway-2.0" ;;
            *) echo "::error::Unknown service: $ROLLBACK_SERVICE"; exit 1 ;;
          esac

          # SSH to VM and restart with previous version
          ssh -o ServerAliveInterval=60 azureuser@20.17.176.1 "bash -s" << EOF
          set -e
          DEPLOY_PATH="/opt/stocktracker"
          cd \$DEPLOY_PATH

          # Check if previous version image exists
          if ! docker images "${IMAGE}:${PREV_VERSION}" --format "{{.ID}}" | grep -q .; then
            echo "::error::Previous version image ${IMAGE}:${PREV_VERSION} not found on VM"
            docker images "${IMAGE}" --format "table {{.Repository}}\t{{.Tag}}\t{{.Size}}"
            exit 1
          fi

          # Restart container with previous version
          echo "Restarting ${ROLLBACK_SERVICE} with ${PREV_VERSION}..."

          # Update .env.versions with the rollback version
          ENV_FILE="/opt/stocktracker/.env.versions"
          case "${ROLLBACK_SERVICE}" in
            "data-fetcher-2.0") VAR_NAME="DATA_FETCHER_2_VERSION" ;;
            "metrics") VAR_NAME="METRICS_VERSION" ;;
            "back-office") VAR_NAME="BACK_OFFICE_VERSION" ;;
            "mcp-analysis") VAR_NAME="MCP_ANALYSIS_VERSION" ;;
            "gateway-2.0") VAR_NAME="GATEWAY_2_VERSION" ;;
          esac

          if [ -f "\$ENV_FILE" ] && grep -q "^\${VAR_NAME}=" "\$ENV_FILE"; then
            sed -i "s/^\${VAR_NAME}=.*/\${VAR_NAME}=${PREV_VERSION}/" "\$ENV_FILE"
          else
            echo "\${VAR_NAME}=${PREV_VERSION}" >> "\$ENV_FILE"
          fi
          echo "  Updated \$ENV_FILE: \${VAR_NAME}=${PREV_VERSION}"

          # Restart with updated version
          /opt/stocktracker/scripts/start-services.sh up -d ${ROLLBACK_SERVICE}

          echo "✅ Rollback complete: ${ROLLBACK_SERVICE} -> ${PREV_VERSION}"
          EOF

          # Decrement version in DB
          curl -s "${DB_REST_URL}/rest/v1/worker_versions?service=eq.${ROLLBACK_SERVICE}" \
            -X PATCH \
            -H "apikey: ${DB_REST_KEY}" \
            -H "Authorization: Bearer ${DB_REST_KEY}" \
            -H "Content-Type: application/json" \
            -H "Prefer: return=minimal" \
            -d "{\"minor_version\": ${PREV_MINOR}, \"updated_at\": \"$(date -u +%Y-%m-%dT%H:%M:%SZ)\"}" || true

          echo "✅ DB version decremented to v${MAJOR}.${PREV_MINOR}"

      # ===========================================
      # Sync config and start services
      # ===========================================
      - name: Sync config and deploy services
        if: github.event.inputs.rollback_service == ''
        run: |
          ssh -o ServerAliveInterval=60 azureuser@20.17.176.1 'bash -s' << 'EOF'
          set -e
          DEPLOY_PATH="/opt/stocktracker"

          echo "=========================================="
          echo "=== Syncing repository ==="
          echo "=========================================="
          cd $DEPLOY_PATH/repo
          git fetch origin main
          git reset --hard origin/main

          echo "=== Copying config files ==="
          cp $DEPLOY_PATH/repo/deployment/vm/docker-compose.yml $DEPLOY_PATH/
          cp $DEPLOY_PATH/repo/deployment/vm/Caddyfile $DEPLOY_PATH/
          cp $DEPLOY_PATH/repo/deployment/vm/alloy-config.alloy $DEPLOY_PATH/
          cp -r $DEPLOY_PATH/repo/deployment/vm/postgres $DEPLOY_PATH/
          sudo cp $DEPLOY_PATH/repo/deployment/vm/scripts/*.sh $DEPLOY_PATH/scripts/
          sudo chmod +x $DEPLOY_PATH/scripts/*.sh
          sudo chown azureuser:azureuser $DEPLOY_PATH/scripts/*

          echo "=== Installing systemd boot service ==="
          sudo cp $DEPLOY_PATH/repo/deployment/vm/stocktracker.service /etc/systemd/system/
          sudo systemctl daemon-reload
          sudo systemctl enable stocktracker.service

          echo "=========================================="
          echo "=== Starting services ==="
          echo "=========================================="
          cd $DEPLOY_PATH
          # Docker Compose detects image changes and only recreates affected containers
          ./scripts/start-services.sh up -d

          # Build tool images (not started, used by host cron scripts)
          echo "=== Building tool images ==="
          docker compose --profile tools build freshness-check 2>/dev/null || \
            echo "WARNING: freshness-check build failed (non-blocking)"

          # NOTE: Frontend is deployed via Vercel, not on VM
          EOF

          ssh -o ServerAliveInterval=60 azureuser@20.17.176.1 'bash -s' << 'EOF'

          echo "=== Reloading Caddy config ==="
          docker exec caddy caddy reload --config /etc/caddy/Caddyfile || docker restart caddy

          echo "=== Reloading Alloy config ==="
          docker exec alloy wget -qO- http://localhost:12345/-/reload 2>/dev/null || docker restart alloy

          echo "=== Cleanup old images (keep running + 1 previous for rollback) ==="
          # Smart cleanup: keep 2 most recent versions per service (running + previous for rollback)
          for SERVICE in data-fetcher-2.0 metrics back-office mcp-analysis gateway-2.0; do
            # Get all version tags for this service, sorted by version number
            TAGS=$(docker images "stocktracker-${SERVICE}" --format '{{.Tag}}' | grep -E '^v[0-9]+\.[0-9]+$' | sort -V 2>/dev/null || true)
            if [ -n "$TAGS" ]; then
              # Keep only the 2 most recent versions
              DELETE_TAGS=$(echo "$TAGS" | head -n -2)
              if [ -n "$DELETE_TAGS" ]; then
                echo "Cleaning old images for ${SERVICE}..."
                echo "$DELETE_TAGS" | while read TAG; do
                  docker rmi "stocktracker-${SERVICE}:${TAG}" 2>/dev/null || true
                done
              fi
            fi
          done

          # Also prune dangling images
          docker image prune -f

          echo "=== Running containers ==="
          docker ps
          EOF

      # ===========================================
      # Smart health polling
      # ===========================================
      - name: Verify deployment (smart health polling)
        run: |
          echo "=========================================="
          echo "=== Smart Health Polling ==="
          echo "=========================================="

          wait_healthy() {
            local url=$1
            local name=$2
            local max_attempts=30
            local attempt=0

            echo "Waiting for $name..."
            while [ $attempt -lt $max_attempts ]; do
              if curl -sf "$url" > /dev/null 2>&1; then
                echo "✅ $name: OK (${attempt}s)"
                return 0
              fi
              sleep 2
              attempt=$((attempt + 2))
            done
            echo "⚠️ $name: TIMEOUT after ${max_attempts}s"
            return 1
          }

          echo ""
          echo "=== Checking services ==="
          curl -sf https://nxserver.malaysiawest.cloudapp.azure.com/ > /dev/null && echo "✅ n8n: OK" || echo "⚠️ n8n: May need login"

          wait_healthy "https://nxserver.malaysiawest.cloudapp.azure.com/api/fred/health/live" "FRED (via Data Fetcher 2.0)"
          wait_healthy "https://nxserver.malaysiawest.cloudapp.azure.com/api/data-fetcher-2.0/health/live" "Data Fetcher 2.0"
          wait_healthy "https://nxserver.malaysiawest.cloudapp.azure.com/api/analysis/health/live" "Candlestick Analysis (via Data Fetcher 2.0)"
          wait_healthy "https://nxserver.malaysiawest.cloudapp.azure.com/api/metrics/health/live" "Metrics"

          curl -sf https://nxserver.malaysiawest.cloudapp.azure.com/back-office/ > /dev/null && echo "✅ Back Office: OK" || echo "⚠️ Back Office: Starting..."

          # NOTE: Frontend is deployed via Vercel, not on VM

          # Gateway 2.0 (TypeScript) container - check via SSH
          ssh azureuser@20.17.176.1 'docker exec gateway-2.0 curl -sf http://localhost:8080/health/live' > /dev/null && echo "✅ Gateway 2.0: OK" || echo "⚠️ Gateway 2.0: Check Docker logs"

          # MCP Analysis runs on internal port 8085 - check via SSH
          ssh azureuser@20.17.176.1 'curl -sf http://localhost:8085/health' > /dev/null && echo "✅ MCP Analysis: OK" || echo "⚠️ MCP Analysis: Check Docker logs"

          # Telegram is handled by Gateway 2.0 (in-process extension)

          ssh azureuser@20.17.176.1 'docker ps --filter name=alloy --format "{{.Status}}"' || echo "⚠️ Alloy: Check logs"

          # Summary
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "## 🚀 Deployment Complete" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY

          # Build path indicator
          if [ "${{ needs.build.outputs.build_success }}" == "true" ]; then
            echo "✅ **Build Path**: GitHub Actions (optimized)" >> $GITHUB_STEP_SUMMARY
          elif [ "${{ needs.detect-changes.outputs.any_service }}" != "true" ]; then
            echo "⏭️ **Build Path**: Skipped (config-only change)" >> $GITHUB_STEP_SUMMARY
          else
            echo "⚠️ **Build Path**: VM fallback" >> $GITHUB_STEP_SUMMARY
          fi

          echo "" >> $GITHUB_STEP_SUMMARY
          echo "### 🔗 Service URLs" >> $GITHUB_STEP_SUMMARY
          echo "- [n8n](https://nxserver.malaysiawest.cloudapp.azure.com/)" >> $GITHUB_STEP_SUMMARY
          echo "- [FRED Status](https://nxserver.malaysiawest.cloudapp.azure.com/api/fred/status)" >> $GITHUB_STEP_SUMMARY
          echo "- [Data Fetcher 2.0 Swagger](https://nxserver.malaysiawest.cloudapp.azure.com/api/data-fetcher-2.0/swagger)" >> $GITHUB_STEP_SUMMARY
          echo "- [Candlestick Analysis Swagger (via Data Fetcher 2.0)](https://nxserver.malaysiawest.cloudapp.azure.com/api/analysis/swagger)" >> $GITHUB_STEP_SUMMARY
          echo "- [Metrics Swagger](https://nxserver.malaysiawest.cloudapp.azure.com/api/metrics/swagger)" >> $GITHUB_STEP_SUMMARY
          echo "- [Back Office](https://nxserver.malaysiawest.cloudapp.azure.com/back-office/)" >> $GITHUB_STEP_SUMMARY
          echo "- Gateway 2.0: TypeScript container (gateway-2.0:8080, includes Telegram)" >> $GITHUB_STEP_SUMMARY

          echo ""
          echo "=========================================="
          echo "✅ Deployment complete!"
          echo "=========================================="

      # ===========================================
      # Update versions in DB after successful deploy
      # ===========================================
      - name: Update versions in DB
        if: success() && github.event.inputs.rollback_service == ''
        env:
          DB_REST_URL: ${{ secrets.DATABASE_URL_JS }}
          DB_REST_KEY: ${{ secrets.DATABASE_SERVICE_ROLE_KEY }}
          DATA_FETCHER_2_CHANGED: ${{ needs.detect-changes.outputs.datafetcher2 }}
          METRICS_CHANGED: ${{ needs.detect-changes.outputs.metrics }}
          BACKOFFICE_CHANGED: ${{ needs.detect-changes.outputs.backoffice }}
          MCP_CHANGED: ${{ needs.detect-changes.outputs.mcp }}
          GATEWAY2_CHANGED: ${{ needs.detect-changes.outputs.gateway2 }}
          DATA_FETCHER_2_VERSION: ${{ needs.detect-changes.outputs.datafetcher2_version }}
          METRICS_VERSION: ${{ needs.detect-changes.outputs.metrics_version }}
          BACKOFFICE_VERSION: ${{ needs.detect-changes.outputs.backoffice_version }}
          MCP_VERSION: ${{ needs.detect-changes.outputs.mcp_version }}
          GATEWAY2_VERSION: ${{ needs.detect-changes.outputs.gateway2_version }}
          FORCE_BUILD: ${{ github.event.inputs.force_build }}
        run: |
          echo "=========================================="
          echo "=== Updating versions in DB ==="
          echo "=========================================="

          echo ""
          echo "=== Version Update Summary ==="
          echo "Services marked 'true' OR force_build='true' will have versions updated:"
          echo "  DATA_FETCHER_2_CHANGED: $DATA_FETCHER_2_CHANGED"
          echo "  METRICS_CHANGED:     $METRICS_CHANGED"
          echo "  BACKOFFICE_CHANGED:  $BACKOFFICE_CHANGED"
          echo "  MCP_CHANGED:         $MCP_CHANGED"
          echo "  GATEWAY2_CHANGED:    $GATEWAY2_CHANGED"
          echo "  FORCE_BUILD:         $FORCE_BUILD"
          echo ""

          UPDATED_AT=$(date -u +%Y-%m-%dT%H:%M:%SZ)

          update_version() {
            local service=$1
            local version=$2
            local major=$(echo "$version" | cut -d. -f1)
            local minor=$(echo "$version" | cut -d. -f2)

            echo "Updating $service to v$version..."

            HTTP_CODE=$(curl -s -o /dev/null -w "%{http_code}" \
              "${DB_REST_URL}/rest/v1/worker_versions?service=eq.${service}" \
              -X PATCH \
              -H "apikey: ${DB_REST_KEY}" \
              -H "Authorization: Bearer ${DB_REST_KEY}" \
              -H "Content-Type: application/json" \
              -H "Prefer: return=minimal" \
              -d "{\"major_version\": ${major}, \"minor_version\": ${minor}, \"updated_at\": \"${UPDATED_AT}\"}" \
              || echo "000")

            if [ "$HTTP_CODE" = "204" ] || [ "$HTTP_CODE" = "200" ]; then
              echo "  ✅ $service -> v$version"
            else
              echo "  ⚠️ Failed to update $service (HTTP $HTTP_CODE)"
            fi
          }

          # Update versions for deployed services
          [ "$DATA_FETCHER_2_CHANGED" == "true" ] || [ "$FORCE_BUILD" == "true" ] && update_version "data-fetcher-2.0" "$DATA_FETCHER_2_VERSION"
          [ "$METRICS_CHANGED" == "true" ] || [ "$FORCE_BUILD" == "true" ] && update_version "metrics" "$METRICS_VERSION"
          [ "$BACKOFFICE_CHANGED" == "true" ] || [ "$FORCE_BUILD" == "true" ] && update_version "back-office" "$BACKOFFICE_VERSION"
          [ "$MCP_CHANGED" == "true" ] || [ "$FORCE_BUILD" == "true" ] && update_version "mcp-analysis" "$MCP_VERSION"
          [ "$GATEWAY2_CHANGED" == "true" ] || [ "$FORCE_BUILD" == "true" ] && update_version "gateway-2.0" "$GATEWAY2_VERSION"

          echo ""
          echo "✅ Version updates complete"
