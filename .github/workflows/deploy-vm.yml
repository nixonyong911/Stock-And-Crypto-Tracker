# ===========================================
# Deploy Backend Services to Azure VM
# ===========================================
# ALL OPTIMIZATIONS APPLIED:
# Phase 1: Smart health polling, combined SSH
# Phase 2: GHA builds, BuildKit caching, compressed transfer, auto-fallback
# Phase 3: Selective builds (paths-filter), parallel matrix builds
#
# BASELINE (before optimization): ~8-12 min
# TARGET (Phase 3): ~3-5 min (60-70% faster)
# BEST CASE (config-only): ~1-2 min (skip all builds)
# ===========================================
# Services: n8n, Caddy, TwelveData, Metrics, Candlestick Analysis, AI Hub 2.0, Alloy
# AI Hub: Go-based ai-hub2 container
# Monitoring: Grafana Cloud (via Alloy)
# Secrets: Injected at runtime via Infisical CLI (Machine Identity)
# Infrastructure Config: instruction/reference/infrastructure-config.md
# ===========================================

name: Deploy to Azure VM

on:
  push:
    branches: [main]
    paths:
      - 'services/workers/data-fetcher/TwelveData/**'
      - 'services/workers/analysis/**'
      - 'services/metrics/**'
      - 'services/ai/ai-hub2.0/**'
      - 'services/back-office/**'
      - 'services/mcp/**'
      - 'services/social-media/telegram-2.0/**'
      - 'services/frontend/**'
      - 'services/common/**'
      - 'deployment/vm/**'
      - '.github/workflows/deploy-vm.yml'
  workflow_dispatch:
    inputs:
      force_build:
        description: 'Force rebuild all services (ignore change detection)'
        required: false
        default: 'false'
        type: boolean
      rollback_service:
        description: 'Service to rollback (leave empty for normal deploy)'
        required: false
        type: choice
        options:
          - ''
          - 'twelvedata'
          - 'candlestick-analysis'
          - 'metrics'
          - 'back-office'
          - 'mcp-analysis'
          - 'telegram-bot-2.0'
          - 'ai-hub2'
          - 'frontend-staging'

jobs:
  # ===========================================
  # PHASE 3: Detect which services changed
  # ===========================================
  detect-changes:
    runs-on: ubuntu-latest
    outputs:
      twelvedata: ${{ steps.filter.outputs.twelvedata }}
      analysis: ${{ steps.filter.outputs.analysis }}
      metrics: ${{ steps.filter.outputs.metrics }}
      backoffice: ${{ steps.filter.outputs.backoffice }}
      mcp: ${{ steps.filter.outputs.mcp }}
      telegram2: ${{ steps.filter.outputs.telegram2 }}
      aihub2: ${{ steps.filter.outputs.aihub2 }}
      frontend: ${{ steps.filter.outputs.frontend }}
      config: ${{ steps.filter.outputs.config }}
      # NOTE: frontend is NOT in any_service because it's built on VM only (needs Infisical staging secrets)
      any_service: ${{ steps.filter.outputs.twelvedata == 'true' || steps.filter.outputs.analysis == 'true' || steps.filter.outputs.metrics == 'true' || steps.filter.outputs.backoffice == 'true' || steps.filter.outputs.mcp == 'true' || steps.filter.outputs.telegram2 == 'true' || steps.filter.outputs.aihub2 == 'true' }}
      # Version outputs for tagging
      twelvedata_version: ${{ steps.versions.outputs.twelvedata }}
      analysis_version: ${{ steps.versions.outputs.analysis }}
      metrics_version: ${{ steps.versions.outputs.metrics }}
      backoffice_version: ${{ steps.versions.outputs.backoffice }}
      mcp_version: ${{ steps.versions.outputs.mcp }}
      telegram2_version: ${{ steps.versions.outputs.telegram2 }}
      aihub2_version: ${{ steps.versions.outputs.aihub2 }}
      frontend_version: ${{ steps.versions.outputs.frontend }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Detect changed paths
        id: filter
        uses: dorny/paths-filter@v3
        with:
          filters: |
            twelvedata:
              - 'services/workers/data-fetcher/TwelveData/**'
              - 'services/common/**'
            analysis:
              - 'services/workers/analysis/**'
              - 'services/common/**'
            metrics:
              - 'services/metrics/**'
              - 'services/common/**'
            backoffice:
              - 'services/back-office/**'
            mcp:
              - 'services/mcp/**'
            telegram2:
              - 'services/social-media/telegram-2.0/**'
            aihub2:
              - 'services/ai/ai-hub2.0/**'
            frontend:
              - 'services/frontend/**'
            config:
              - 'deployment/vm/**'
              - '.github/workflows/deploy-vm.yml'

      - name: Log detected changes
        run: |
          echo "=========================================="
          echo "=== Detected Changes ==="
          echo "=========================================="
          echo "TwelveData: ${{ steps.filter.outputs.twelvedata }}"
          echo "Analysis: ${{ steps.filter.outputs.analysis }}"
          echo "Metrics: ${{ steps.filter.outputs.metrics }}"
          echo "Back Office: ${{ steps.filter.outputs.backoffice }}"
          echo "MCP Analysis: ${{ steps.filter.outputs.mcp }}"
          echo "Telegram Bot 2.0: ${{ steps.filter.outputs.telegram2 }}"
          echo "AI Hub 2.0: ${{ steps.filter.outputs.aihub2 }}"
          echo "Frontend Staging: ${{ steps.filter.outputs.frontend }}"
          echo "Config: ${{ steps.filter.outputs.config }}"
          echo "Force Build: ${{ github.event.inputs.force_build }}"
          echo "Rollback Service: ${{ github.event.inputs.rollback_service }}"
          
          # Summary
          echo "## 🔍 Change Detection" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "| Service | Changed |" >> $GITHUB_STEP_SUMMARY
          echo "|---------|---------|" >> $GITHUB_STEP_SUMMARY
          echo "| TwelveData | ${{ steps.filter.outputs.twelvedata }} |" >> $GITHUB_STEP_SUMMARY
          echo "| Analysis | ${{ steps.filter.outputs.analysis }} |" >> $GITHUB_STEP_SUMMARY
          echo "| Metrics | ${{ steps.filter.outputs.metrics }} |" >> $GITHUB_STEP_SUMMARY
          echo "| Back Office | ${{ steps.filter.outputs.backoffice }} |" >> $GITHUB_STEP_SUMMARY
          echo "| MCP Analysis | ${{ steps.filter.outputs.mcp }} |" >> $GITHUB_STEP_SUMMARY
          echo "| Telegram Bot 2.0 | ${{ steps.filter.outputs.telegram2 }} |" >> $GITHUB_STEP_SUMMARY
          echo "| AI Hub 2.0 | ${{ steps.filter.outputs.aihub2 }} |" >> $GITHUB_STEP_SUMMARY
          echo "| Frontend Staging | ${{ steps.filter.outputs.frontend }} |" >> $GITHUB_STEP_SUMMARY
          echo "| Config | ${{ steps.filter.outputs.config }} |" >> $GITHUB_STEP_SUMMARY

      # Query current versions from Supabase (increment minor for new deploys)
      - name: Get versions from Supabase
        id: versions
        env:
          SUPABASE_URL: ${{ secrets.NEXT_PUBLIC_SUPABASE_URL }}
          SUPABASE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
        run: |
          echo "Querying current versions from Supabase..."
          
          # Service name mapping (workflow name -> DB service name)
          declare -A SERVICE_MAP=(
            ["twelvedata"]="twelvedata"
            ["analysis"]="candlestick-analysis"
            ["metrics"]="metrics"
            ["backoffice"]="back-office"
            ["mcp"]="mcp-analysis"
            ["telegram2"]="telegram-bot-2.0"
            ["aihub2"]="ai-hub2"
            ["frontend"]="frontend-staging"
          )
          
          # Query all versions from Supabase
          RESPONSE=$(curl -sf "${SUPABASE_URL}/rest/v1/worker_versions?select=service,major_version,minor_version" \
            -H "apikey: ${SUPABASE_KEY}" \
            -H "Authorization: Bearer ${SUPABASE_KEY}")
          
          if [ -z "$RESPONSE" ]; then
            echo "::warning::Failed to query Supabase, using default versions"
            # Default to v1.0 for all services
            for key in "${!SERVICE_MAP[@]}"; do
              echo "${key}=1.0" >> $GITHUB_OUTPUT
            done
            exit 0
          fi
          
          echo "Raw response: $RESPONSE"
          
          # Parse and output new versions (current minor + 1)
          for key in "${!SERVICE_MAP[@]}"; do
            DB_NAME="${SERVICE_MAP[$key]}"
            
            # Extract version for this service using jq
            MAJOR=$(echo "$RESPONSE" | jq -r ".[] | select(.service == \"$DB_NAME\") | .major_version // 1")
            MINOR=$(echo "$RESPONSE" | jq -r ".[] | select(.service == \"$DB_NAME\") | .minor_version // 0")
            
            # Default if not found
            [ -z "$MAJOR" ] || [ "$MAJOR" == "null" ] && MAJOR=1
            [ -z "$MINOR" ] || [ "$MINOR" == "null" ] && MINOR=0
            
            # New version = current minor + 1
            NEW_MINOR=$((MINOR + 1))
            NEW_VERSION="${MAJOR}.${NEW_MINOR}"
            
            echo "${key}=${NEW_VERSION}" >> $GITHUB_OUTPUT
            echo "  $DB_NAME: v${MAJOR}.${MINOR} -> v${NEW_VERSION}"
          done

  # ===========================================
  # Cleanup caches (artifacts no longer used - direct SCP transfer)
  # ===========================================
  cleanup-storage:
    runs-on: ubuntu-latest
    permissions:
      actions: write
    steps:
      # NOTE: Artifacts no longer used - images transferred directly via SCP to bypass quota
      - name: Cleanup old BuildKit caches (keep 1 per scope)
        run: |
          echo "Checking cache storage..."
          
          # Service scopes used in build job
          SCOPES="twelvedata analysis metrics backoffice mcp telegram2 aihub2"
          
          for SCOPE in $SCOPES; do
            echo "--- Processing scope: $SCOPE ---"
            
            # Get all caches for this scope, sorted by last accessed (newest first)
            CACHES=$(gh cache list -R ${{ github.repository }} --key "$SCOPE" --json id,key,lastAccessedAt 2>/dev/null \
              | jq 'sort_by(.lastAccessedAt) | reverse' 2>/dev/null || echo "[]")
            
            TOTAL=$(echo "$CACHES" | jq length)
            
            if [ "$TOTAL" -gt 1 ]; then
              # Keep only the latest (index 0), delete the rest
              echo "$CACHES" | jq -r '.[1:][] | .key' | while read key; do
                echo "  Deleting: $key"
                gh cache delete "$key" -R ${{ github.repository }} 2>/dev/null || true
              done
              echo "  Kept latest, deleted $((TOTAL - 1)) old caches"
            fi
          done
          
          # Clean up old buildkit blobs not accessed in last 7 days
          echo "--- Cleaning old buildkit blobs (>7 days) ---"
          gh cache list -R ${{ github.repository }} --json key,lastAccessedAt 2>/dev/null \
            | jq -r '.[] | select(.key | startswith("buildkit-blob-")) | select((.lastAccessedAt | fromdateiso8601) < (now - 604800)) | .key' 2>/dev/null \
            | while read key; do
                echo "  Deleting old blob: $key"
                gh cache delete "$key" -R ${{ github.repository }} 2>/dev/null || true
              done
          
          echo "Cache cleanup complete"
        env:
          GH_TOKEN: ${{ github.token }}

  # ===========================================
  # PHASE 3: Build only changed services (parallel)
  # ===========================================
  build:
    needs: [detect-changes, cleanup-storage]
    runs-on: ubuntu-latest
    # Skip build job entirely if only config changed and not forcing
    if: needs.detect-changes.outputs.any_service == 'true' || github.event.inputs.force_build == 'true'
    outputs:
      build_success: ${{ steps.build-result.outputs.success }}
      images_built: ${{ steps.build-result.outputs.images }}
    
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      # Build TwelveData (only if changed or forced)
      - name: Build TwelveData image
        id: build-twelvedata
        if: (needs.detect-changes.outputs.twelvedata == 'true' || github.event.inputs.force_build == 'true') && github.event.inputs.rollback_service == ''
        continue-on-error: true
        uses: docker/build-push-action@v5
        with:
          context: services/
          file: services/workers/data-fetcher/TwelveData/Dockerfile
          tags: stocktracker-twelvedata:v${{ needs.detect-changes.outputs.twelvedata_version }}
          cache-from: type=gha,scope=twelvedata
          cache-to: type=gha,mode=max,scope=twelvedata
          outputs: type=docker,dest=/tmp/twelvedata.tar

      # Build Candlestick Analysis (only if changed or forced)
      - name: Build Candlestick Analysis image
        id: build-analysis
        if: (needs.detect-changes.outputs.analysis == 'true' || github.event.inputs.force_build == 'true') && github.event.inputs.rollback_service == ''
        continue-on-error: true
        uses: docker/build-push-action@v5
        with:
          context: services/
          file: services/workers/analysis/CandlestickAnalysis/Dockerfile
          tags: stocktracker-candlestick-analysis:v${{ needs.detect-changes.outputs.analysis_version }}
          cache-from: type=gha,scope=analysis
          cache-to: type=gha,mode=max,scope=analysis
          outputs: type=docker,dest=/tmp/candlestick-analysis.tar

      # Build Metrics (only if changed or forced)
      - name: Build Metrics image
        id: build-metrics
        if: (needs.detect-changes.outputs.metrics == 'true' || github.event.inputs.force_build == 'true') && github.event.inputs.rollback_service == ''
        continue-on-error: true
        uses: docker/build-push-action@v5
        with:
          context: services/
          file: services/metrics/StockTracker.Metrics/Dockerfile
          tags: stocktracker-metrics:v${{ needs.detect-changes.outputs.metrics_version }}
          cache-from: type=gha,scope=metrics
          cache-to: type=gha,mode=max,scope=metrics
          outputs: type=docker,dest=/tmp/metrics.tar

      # Build Back Office (only if changed or forced)
      - name: Build Back Office image
        id: build-backoffice
        if: (needs.detect-changes.outputs.backoffice == 'true' || github.event.inputs.force_build == 'true') && github.event.inputs.rollback_service == ''
        continue-on-error: true
        uses: docker/build-push-action@v5
        with:
          context: services/back-office/
          file: services/back-office/Dockerfile
          tags: stocktracker-back-office:v${{ needs.detect-changes.outputs.backoffice_version }}
          build-args: |
            NEXT_PUBLIC_SUPABASE_URL=${{ secrets.NEXT_PUBLIC_SUPABASE_URL }}
            NEXT_PUBLIC_SUPABASE_PUBLISHABLE_DEFAULT_KEY=${{ secrets.NEXT_PUBLIC_SUPABASE_PUBLISHABLE_DEFAULT_KEY }}
          cache-from: type=gha,scope=backoffice
          cache-to: type=gha,mode=max,scope=backoffice
          outputs: type=docker,dest=/tmp/back-office.tar

      # Build MCP Analysis Server (only if changed or forced)
      - name: Build MCP Analysis image
        id: build-mcp
        if: (needs.detect-changes.outputs.mcp == 'true' || github.event.inputs.force_build == 'true') && github.event.inputs.rollback_service == ''
        continue-on-error: true
        uses: docker/build-push-action@v5
        with:
          context: services/mcp/
          file: services/mcp/Dockerfile
          tags: stocktracker-mcp-analysis:v${{ needs.detect-changes.outputs.mcp_version }}
          cache-from: type=gha,scope=mcp
          cache-to: type=gha,mode=max,scope=mcp
          outputs: type=docker,dest=/tmp/mcp-analysis.tar

      # Build Telegram Bot 2.0 (only if changed or forced)
      - name: Build Telegram Bot 2.0 image
        id: build-telegram2
        if: (needs.detect-changes.outputs.telegram2 == 'true' || github.event.inputs.force_build == 'true') && github.event.inputs.rollback_service == ''
        continue-on-error: true
        uses: docker/build-push-action@v5
        with:
          context: services/social-media/telegram-2.0/
          file: services/social-media/telegram-2.0/Dockerfile
          tags: stocktracker-telegram-bot-2.0:v${{ needs.detect-changes.outputs.telegram2_version }}
          cache-from: type=gha,scope=telegram2
          cache-to: type=gha,mode=max,scope=telegram2
          outputs: type=docker,dest=/tmp/telegram-bot-2.0.tar

      # Build AI Hub 2.0 (Go) (only if changed or forced)
      - name: Build AI Hub 2.0 image
        id: build-aihub2
        if: (needs.detect-changes.outputs.aihub2 == 'true' || github.event.inputs.force_build == 'true') && github.event.inputs.rollback_service == ''
        continue-on-error: true
        uses: docker/build-push-action@v5
        with:
          context: services/ai/ai-hub2.0/
          file: services/ai/ai-hub2.0/Dockerfile
          tags: stocktracker-ai-hub2:v${{ needs.detect-changes.outputs.aihub2_version }}
          cache-from: type=gha,scope=aihub2
          cache-to: type=gha,mode=max,scope=aihub2
          outputs: type=docker,dest=/tmp/ai-hub2.tar

      # NOTE: Frontend Staging is NOT built on GHA
      # It must be built on VM with Infisical STAGING secrets (not Production)
      # The start-frontend-staging.sh script handles this during deploy

      # Compress built images
      - name: Compress Docker images
        id: compress
        run: |
          mkdir -p /tmp/images
          BUILT=""
          
          if [ -f /tmp/twelvedata.tar ]; then
            gzip -1 < /tmp/twelvedata.tar > /tmp/images/twelvedata.tar.gz
            BUILT="${BUILT}twelvedata,"
            echo "✅ TwelveData compressed"
          else
            echo "⏭️ TwelveData skipped (unchanged)"
          fi
          
          if [ -f /tmp/candlestick-analysis.tar ]; then
            gzip -1 < /tmp/candlestick-analysis.tar > /tmp/images/candlestick-analysis.tar.gz
            BUILT="${BUILT}analysis,"
            echo "✅ Candlestick Analysis compressed"
          else
            echo "⏭️ Candlestick Analysis skipped (unchanged)"
          fi
          
          if [ -f /tmp/metrics.tar ]; then
            gzip -1 < /tmp/metrics.tar > /tmp/images/metrics.tar.gz
            BUILT="${BUILT}metrics,"
            echo "✅ Metrics compressed"
          else
            echo "⏭️ Metrics skipped (unchanged)"
          fi
          
          if [ -f /tmp/back-office.tar ]; then
            gzip -1 < /tmp/back-office.tar > /tmp/images/back-office.tar.gz
            BUILT="${BUILT}backoffice,"
            echo "✅ Back Office compressed"
          else
            echo "⏭️ Back Office skipped (unchanged)"
          fi
          
          if [ -f /tmp/mcp-analysis.tar ]; then
            gzip -1 < /tmp/mcp-analysis.tar > /tmp/images/mcp-analysis.tar.gz
            BUILT="${BUILT}mcp,"
            echo "✅ MCP Analysis compressed"
          else
            echo "⏭️ MCP Analysis skipped (unchanged)"
          fi
          
          if [ -f /tmp/telegram-bot-2.0.tar ]; then
            gzip -1 < /tmp/telegram-bot-2.0.tar > /tmp/images/telegram-bot-2.0.tar.gz
            BUILT="${BUILT}telegram2,"
            echo "✅ Telegram Bot 2.0 compressed"
          else
            echo "⏭️ Telegram Bot 2.0 skipped (unchanged)"
          fi
          
          if [ -f /tmp/ai-hub2.tar ]; then
            gzip -1 < /tmp/ai-hub2.tar > /tmp/images/ai-hub2.tar.gz
            BUILT="${BUILT}aihub2,"
            echo "✅ AI Hub 2.0 compressed"
          else
            echo "⏭️ AI Hub 2.0 skipped (unchanged)"
          fi
          
          # NOTE: Frontend Staging is built on VM only (needs Infisical staging secrets)
          
          echo "built=$BUILT" >> $GITHUB_OUTPUT
          ls -lh /tmp/images/ 2>/dev/null || echo "No images to transfer"

      # Check build result
      - name: Check build result
        id: build-result
        run: |
          # Check if any images were actually built
          if ls /tmp/images/*.tar.gz 1>/dev/null 2>&1; then
            SUCCESS="true"
            IMAGES="${{ steps.compress.outputs.built }}"
            echo "✅ Build complete: $IMAGES"
          else
            SUCCESS="false"
            IMAGES=""
            echo "⚠️ No images built"
          fi
          
          echo "success=$SUCCESS" >> $GITHUB_OUTPUT
          echo "images=$IMAGES" >> $GITHUB_OUTPUT

      # Setup SSH for direct transfer (bypass artifact quota)
      - name: Setup SSH for direct transfer
        if: steps.build-result.outputs.success == 'true'
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.VM_SSH_PRIVATE_KEY }}" > ~/.ssh/id_rsa
          chmod 600 ~/.ssh/id_rsa
          cat >> ~/.ssh/config << 'SSHCONFIG'
          Host 20.17.176.1
            StrictHostKeyChecking no
            UserKnownHostsFile /dev/null
            LogLevel ERROR
          SSHCONFIG
          chmod 600 ~/.ssh/config

      # Transfer images directly via SCP (bypass GitHub artifact storage quota)
      - name: Transfer and load images directly
        if: steps.build-result.outputs.success == 'true'
        run: |
          echo "📤 Transferring images directly to VM (bypassing artifact storage)..."
          scp -o ServerAliveInterval=60 /tmp/images/*.tar.gz azureuser@20.17.176.1:/tmp/
          
          ssh -o ServerAliveInterval=60 azureuser@20.17.176.1 'bash -s' << 'EOF'
          set -e
          echo "📥 Loading Docker images..."
          
          for NAME in twelvedata candlestick-analysis metrics back-office mcp-analysis telegram-bot-2.0 ai-hub2; do
            img="/tmp/${NAME}.tar.gz"
            if [ -f "$img" ]; then
              echo "Loading $NAME..."
              gunzip -c "$img" | docker load
              rm "$img"
              echo "✅ $NAME loaded"
            fi
          done
          
          echo "✅ Images loaded directly from build job"
          docker images --format "table {{.Repository}}\t{{.Tag}}\t{{.Size}}" | head -10
          EOF

      # Log transfer metrics
      - name: Log transfer metrics
        run: |
          echo "## 📦 Build Summary" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          
          if ls /tmp/images/*.tar.gz 1>/dev/null 2>&1; then
            TOTAL_SIZE=$(du -ch /tmp/images/*.tar.gz 2>/dev/null | tail -1 | cut -f1 || echo "0")
            echo "| Image | Size | Status |" >> $GITHUB_STEP_SUMMARY
            echo "|-------|------|--------|" >> $GITHUB_STEP_SUMMARY
            
            for service in twelvedata candlestick-analysis metrics back-office mcp-analysis telegram-bot-2.0 ai-hub2; do
              if [ -f "/tmp/images/${service}.tar.gz" ]; then
                SIZE=$(du -h "/tmp/images/${service}.tar.gz" | cut -f1)
                echo "| $service | $SIZE | ✅ Built |" >> $GITHUB_STEP_SUMMARY
              else
                echo "| $service | - | ⏭️ Skipped |" >> $GITHUB_STEP_SUMMARY
              fi
            done
            
            echo "" >> $GITHUB_STEP_SUMMARY
            echo "**Total transfer**: $TOTAL_SIZE" >> $GITHUB_STEP_SUMMARY
          else
            echo "No images built (all skipped or failed)" >> $GITHUB_STEP_SUMMARY
          fi
          
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "💡 Azure inbound transfer is FREE" >> $GITHUB_STEP_SUMMARY

  # ===========================================
  # Deploy to VM
  # ===========================================
  deploy:
    needs: [detect-changes, build]
    # Always run deploy (even if build was skipped for config-only changes)
    if: always() && !cancelled()
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup SSH
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.VM_SSH_PRIVATE_KEY }}" > ~/.ssh/id_rsa
          chmod 600 ~/.ssh/id_rsa
          
          # Configure SSH to skip host key verification for our controlled VM
          # This is acceptable for CI/CD with a known, controlled server
          cat >> ~/.ssh/config << 'SSHCONFIG'
          Host 20.17.176.1
            StrictHostKeyChecking no
            UserKnownHostsFile /dev/null
            LogLevel ERROR
          SSHCONFIG
          chmod 600 ~/.ssh/config

      # NOTE: Images are now transferred directly from build job via SCP (bypasses artifact quota)
      # No artifact download needed - images are already loaded on VM
      - name: Verify images loaded (GHA build path)
        if: needs.build.outputs.build_success == 'true'
        run: |
          echo "=========================================="
          echo "=== Verifying GHA-built images on VM ==="
          echo "=========================================="
          echo "Images were transferred directly from build job (no artifact storage used)"
          
          ssh -o ServerAliveInterval=60 azureuser@20.17.176.1 'bash -s' << 'EOF'
          echo "Current Docker images:"
          docker images --format "table {{.Repository}}\t{{.Tag}}\t{{.Size}}" | grep stocktracker || echo "No stocktracker images yet"
          EOF

      # ===========================================
      # FALLBACK PATH: Build on VM if needed (selective)
      # ===========================================
      - name: Fallback - Build on VM
        if: |
          github.event.inputs.rollback_service == '' && (
            needs.build.result == 'failure' || 
            (needs.detect-changes.outputs.any_service == 'true' && needs.build.outputs.build_success != 'true')
          )
        env:
          TWELVEDATA_CHANGED: ${{ needs.detect-changes.outputs.twelvedata }}
          ANALYSIS_CHANGED: ${{ needs.detect-changes.outputs.analysis }}
          METRICS_CHANGED: ${{ needs.detect-changes.outputs.metrics }}
          BACKOFFICE_CHANGED: ${{ needs.detect-changes.outputs.backoffice }}
          MCP_CHANGED: ${{ needs.detect-changes.outputs.mcp }}
          TELEGRAM2_CHANGED: ${{ needs.detect-changes.outputs.telegram2 }}
          AIHUB2_CHANGED: ${{ needs.detect-changes.outputs.aihub2 }}
          FORCE_BUILD: ${{ github.event.inputs.force_build }}
        run: |
          echo "::warning::GHA build failed or incomplete, falling back to VM build"
          echo "=========================================="
          echo "=== FALLBACK: Building on VM (selective) ==="
          echo "=========================================="
          
          # Build selective services list based on detected changes
          SERVICES=""
          [ "$TWELVEDATA_CHANGED" == "true" ] || [ "$FORCE_BUILD" == "true" ] && SERVICES="$SERVICES twelvedata"
          [ "$ANALYSIS_CHANGED" == "true" ] || [ "$FORCE_BUILD" == "true" ] && SERVICES="$SERVICES candlestick-analysis"
          [ "$METRICS_CHANGED" == "true" ] || [ "$FORCE_BUILD" == "true" ] && SERVICES="$SERVICES metrics"
          [ "$BACKOFFICE_CHANGED" == "true" ] || [ "$FORCE_BUILD" == "true" ] && SERVICES="$SERVICES back-office"
          [ "$MCP_CHANGED" == "true" ] || [ "$FORCE_BUILD" == "true" ] && SERVICES="$SERVICES mcp-analysis"
          [ "$TELEGRAM2_CHANGED" == "true" ] || [ "$FORCE_BUILD" == "true" ] && SERVICES="$SERVICES telegram-bot-2.0"
          [ "$AIHUB2_CHANGED" == "true" ] || [ "$FORCE_BUILD" == "true" ] && SERVICES="$SERVICES ai-hub2"
          
          # Trim whitespace
          SERVICES=$(echo "$SERVICES" | xargs)
          
          if [ -z "$SERVICES" ]; then
            echo "No services to build"
            exit 0
          fi
          
          echo "Building services: $SERVICES"
          
          ssh -o ServerAliveInterval=60 azureuser@20.17.176.1 "bash -s" << EOF
          set -e
          DEPLOY_PATH="/opt/stocktracker"
          cd \$DEPLOY_PATH
          
          echo "📦 Building Docker services on VM (fallback mode)..."
          # NOTE: Frontend Staging is NOT built here - it's built separately with Infisical staging
          DOCKER_BUILDKIT=1 docker compose build $SERVICES
          
          echo "✅ VM build complete"
          EOF

      # ===========================================
      # ROLLBACK PATH: Rollback to previous version
      # ===========================================
      - name: Rollback service
        if: github.event.inputs.rollback_service != ''
        env:
          ROLLBACK_SERVICE: ${{ github.event.inputs.rollback_service }}
          SUPABASE_URL: ${{ secrets.NEXT_PUBLIC_SUPABASE_URL }}
          SUPABASE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
        run: |
          echo "=========================================="
          echo "=== ROLLBACK: $ROLLBACK_SERVICE ==="
          echo "=========================================="
          
          # Get current version from Supabase
          RESPONSE=$(curl -sf "${SUPABASE_URL}/rest/v1/worker_versions?service=eq.${ROLLBACK_SERVICE}&select=major_version,minor_version" \
            -H "apikey: ${SUPABASE_KEY}" \
            -H "Authorization: Bearer ${SUPABASE_KEY}")
          
          MAJOR=$(echo "$RESPONSE" | jq -r '.[0].major_version // 1')
          MINOR=$(echo "$RESPONSE" | jq -r '.[0].minor_version // 0')
          
          if [ "$MINOR" -le 0 ]; then
            echo "::error::Cannot rollback - already at v${MAJOR}.0 (no previous version exists)"
            exit 1
          fi
          
          # Previous version = current minor - 1
          PREV_MINOR=$((MINOR - 1))
          PREV_VERSION="v${MAJOR}.${PREV_MINOR}"
          
          echo "Rolling back $ROLLBACK_SERVICE from v${MAJOR}.${MINOR} to ${PREV_VERSION}"
          
          # Docker image name mapping
          case "$ROLLBACK_SERVICE" in
            "twelvedata") IMAGE="stocktracker-twelvedata" ;;
            "candlestick-analysis") IMAGE="stocktracker-candlestick-analysis" ;;
            "metrics") IMAGE="stocktracker-metrics" ;;
            "back-office") IMAGE="stocktracker-back-office" ;;
            "mcp-analysis") IMAGE="stocktracker-mcp-analysis" ;;
            "telegram-bot-2.0") IMAGE="stocktracker-telegram-bot-2.0" ;;
            "ai-hub2") IMAGE="stocktracker-ai-hub2" ;;
            "frontend-staging") IMAGE="stocktracker-frontend-staging" ;;
            *) echo "::error::Unknown service: $ROLLBACK_SERVICE"; exit 1 ;;
          esac
          
          # SSH to VM and restart with previous version
          ssh -o ServerAliveInterval=60 azureuser@20.17.176.1 "bash -s" << EOF
          set -e
          DEPLOY_PATH="/opt/stocktracker"
          cd \$DEPLOY_PATH
          
          # Check if previous version image exists
          if ! docker images "${IMAGE}:${PREV_VERSION}" --format "{{.ID}}" | grep -q .; then
            echo "::error::Previous version image ${IMAGE}:${PREV_VERSION} not found on VM"
            docker images "${IMAGE}" --format "table {{.Repository}}\t{{.Tag}}\t{{.Size}}"
            exit 1
          fi
          
          # Restart container with previous version
          echo "Restarting ${ROLLBACK_SERVICE} with ${PREV_VERSION}..."
          
          # Re-tag the previous version as :latest so docker-compose uses it
          docker tag "${IMAGE}:${PREV_VERSION}" "${IMAGE}:latest"
          echo "  Tagged ${IMAGE}:${PREV_VERSION} as ${IMAGE}:latest"
          
          # Now docker compose will use the re-tagged :latest image
          docker compose up -d ${ROLLBACK_SERVICE}
          
          echo "✅ Rollback complete: ${ROLLBACK_SERVICE} -> ${PREV_VERSION}"
          EOF
          
          # Decrement version in Supabase
          curl -sf "${SUPABASE_URL}/rest/v1/worker_versions?service=eq.${ROLLBACK_SERVICE}" \
            -X PATCH \
            -H "apikey: ${SUPABASE_KEY}" \
            -H "Authorization: Bearer ${SUPABASE_KEY}" \
            -H "Content-Type: application/json" \
            -H "Prefer: return=minimal" \
            -d "{\"minor_version\": ${PREV_MINOR}, \"updated_at\": \"$(date -u +%Y-%m-%dT%H:%M:%SZ)\"}"
          
          echo "✅ Supabase version decremented to v${MAJOR}.${PREV_MINOR}"

      # ===========================================
      # Sync config and start services
      # ===========================================
      - name: Sync config and deploy services
        if: github.event.inputs.rollback_service == ''
        run: |
          ssh -o ServerAliveInterval=60 azureuser@20.17.176.1 'bash -s' << 'EOF'
          set -e
          DEPLOY_PATH="/opt/stocktracker"
          
          echo "=========================================="
          echo "=== Syncing repository ==="
          echo "=========================================="
          cd $DEPLOY_PATH/repo
          git fetch origin main
          git reset --hard origin/main
          
          echo "=== Syncing agent-context to stock-tracker ==="
          rsync -av --delete \
            $DEPLOY_PATH/repo/services/ai/ai-hub2.0/agent-context/stock-tracker/ \
            /home/azureuser/stock-tracker/
          
          echo "=== Copying config files ==="
          cp $DEPLOY_PATH/repo/deployment/vm/docker-compose.yml $DEPLOY_PATH/
          cp $DEPLOY_PATH/repo/deployment/vm/Caddyfile $DEPLOY_PATH/
          cp $DEPLOY_PATH/repo/deployment/vm/alloy-config.alloy $DEPLOY_PATH/
          sudo cp $DEPLOY_PATH/repo/deployment/vm/scripts/*.sh $DEPLOY_PATH/scripts/
          sudo chmod +x $DEPLOY_PATH/scripts/*.sh
          sudo chown azureuser:azureuser $DEPLOY_PATH/scripts/*
          
          echo "=========================================="
          echo "=== Starting services ==="
          echo "=========================================="
          cd $DEPLOY_PATH
          # Docker Compose detects image changes and only recreates affected containers
          ./scripts/start-services.sh up -d
          
          echo "=== Building & Starting frontend-staging (Infisical STAGING env) ==="
          # Build with Infisical staging secrets (NEXT_PUBLIC_* embedded at build time)
          ./scripts/start-frontend-staging.sh --build || echo "⚠️ Frontend staging build/start failed - may need manual intervention"
          
          echo "=== Reloading Caddy config ==="
          docker exec caddy caddy reload --config /etc/caddy/Caddyfile || docker restart caddy
          
          echo "=== Reloading Alloy config ==="
          docker exec alloy wget -qO- http://localhost:12345/-/reload 2>/dev/null || docker restart alloy
          
          echo "=== Cleanup old images (keep running + 1 previous for rollback) ==="
          # Smart cleanup: keep 2 most recent versions per service (running + previous for rollback)
          for SERVICE in twelvedata candlestick-analysis metrics back-office mcp-analysis telegram-bot-2.0 ai-hub2 frontend-staging; do
            # Get all version tags for this service, sorted by version number
            TAGS=$(docker images "stocktracker-${SERVICE}" --format '{{.Tag}}' | grep -E '^v[0-9]+\.[0-9]+$' | sort -V 2>/dev/null || true)
            if [ -n "$TAGS" ]; then
              # Keep only the 2 most recent versions
              DELETE_TAGS=$(echo "$TAGS" | head -n -2)
              if [ -n "$DELETE_TAGS" ]; then
                echo "Cleaning old images for ${SERVICE}..."
                echo "$DELETE_TAGS" | while read TAG; do
                  docker rmi "stocktracker-${SERVICE}:${TAG}" 2>/dev/null || true
                done
              fi
            fi
          done
          
          # Also prune dangling images
          docker image prune -f
          
          echo "=== Running containers ==="
          docker ps
          EOF

      # ===========================================
      # Smart health polling
      # ===========================================
      - name: Verify deployment (smart health polling)
        run: |
          echo "=========================================="
          echo "=== Smart Health Polling ==="
          echo "=========================================="
          
          wait_healthy() {
            local url=$1
            local name=$2
            local max_attempts=30
            local attempt=0
            
            echo "Waiting for $name..."
            while [ $attempt -lt $max_attempts ]; do
              if curl -sf "$url" > /dev/null 2>&1; then
                echo "✅ $name: OK (${attempt}s)"
                return 0
              fi
              sleep 2
              attempt=$((attempt + 2))
            done
            echo "⚠️ $name: TIMEOUT after ${max_attempts}s"
            return 1
          }
          
          echo ""
          echo "=== Checking services ==="
          curl -sf https://nxserver.malaysiawest.cloudapp.azure.com/ > /dev/null && echo "✅ n8n: OK" || echo "⚠️ n8n: May need login"
          
          wait_healthy "https://nxserver.malaysiawest.cloudapp.azure.com/api/twelvedata/health/live" "TwelveData"
          wait_healthy "https://nxserver.malaysiawest.cloudapp.azure.com/api/analysis/health/live" "Candlestick Analysis"
          wait_healthy "https://nxserver.malaysiawest.cloudapp.azure.com/api/metrics/health/live" "Metrics"
          
          curl -sf https://nxserver.malaysiawest.cloudapp.azure.com/back-office/ > /dev/null && echo "✅ Back Office: OK" || echo "⚠️ Back Office: Starting..."
          
          # Frontend Staging - check via public URL
          curl -sf https://nxserver.malaysiawest.cloudapp.azure.com/front-end > /dev/null && echo "✅ Frontend Staging: OK" || echo "⚠️ Frontend Staging: Starting..."
          
          # AI Hub 2.0 (Go) container - check via SSH
          ssh azureuser@20.17.176.1 'docker exec ai-hub2 wget -qO- http://localhost:8080/health/live' > /dev/null && echo "✅ AI Hub 2.0: OK" || echo "⚠️ AI Hub 2.0: Check Docker logs"
          
          # MCP Analysis runs on internal port 8085 - check via SSH
          ssh azureuser@20.17.176.1 'curl -sf http://localhost:8085/health' > /dev/null && echo "✅ MCP Analysis: OK" || echo "⚠️ MCP Analysis: Check Docker logs"
          
          # Telegram Bot 2.0 (webhook mode) - check via SSH
          ssh azureuser@20.17.176.1 'docker exec telegram-bot-2.0 wget -qO- http://localhost:8087/health' > /dev/null && echo "✅ Telegram Bot 2.0: OK" || echo "⚠️ Telegram Bot 2.0: Check Docker logs"
          
          ssh azureuser@20.17.176.1 'docker ps --filter name=alloy --format "{{.Status}}"' || echo "⚠️ Alloy: Check logs"
          
          # Summary
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "## 🚀 Deployment Complete" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          
          # Build path indicator
          if [ "${{ needs.build.outputs.build_success }}" == "true" ]; then
            echo "✅ **Build Path**: GitHub Actions (optimized)" >> $GITHUB_STEP_SUMMARY
          elif [ "${{ needs.detect-changes.outputs.any_service }}" != "true" ]; then
            echo "⏭️ **Build Path**: Skipped (config-only change)" >> $GITHUB_STEP_SUMMARY
          else
            echo "⚠️ **Build Path**: VM fallback" >> $GITHUB_STEP_SUMMARY
          fi
          
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "### 🔗 Service URLs" >> $GITHUB_STEP_SUMMARY
          echo "- [n8n](https://nxserver.malaysiawest.cloudapp.azure.com/)" >> $GITHUB_STEP_SUMMARY
          echo "- [TwelveData Swagger](https://nxserver.malaysiawest.cloudapp.azure.com/api/twelvedata/swagger)" >> $GITHUB_STEP_SUMMARY
          echo "- [Candlestick Analysis Swagger](https://nxserver.malaysiawest.cloudapp.azure.com/api/analysis/swagger)" >> $GITHUB_STEP_SUMMARY
          echo "- [Metrics Swagger](https://nxserver.malaysiawest.cloudapp.azure.com/api/metrics/swagger)" >> $GITHUB_STEP_SUMMARY
          echo "- [Back Office](https://nxserver.malaysiawest.cloudapp.azure.com/back-office/)" >> $GITHUB_STEP_SUMMARY
          echo "- [Frontend Staging](https://nxserver.malaysiawest.cloudapp.azure.com/front-end)" >> $GITHUB_STEP_SUMMARY
          echo "- AI Hub 2.0: Go container (ai-hub2:8080)" >> $GITHUB_STEP_SUMMARY
          
          echo ""
          echo "=========================================="
          echo "✅ Deployment complete!"
          echo "=========================================="

      # ===========================================
      # Update versions in Supabase after successful deploy
      # ===========================================
      - name: Update versions in Supabase
        if: success() && github.event.inputs.rollback_service == ''
        env:
          SUPABASE_URL: ${{ secrets.NEXT_PUBLIC_SUPABASE_URL }}
          SUPABASE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
          TWELVEDATA_CHANGED: ${{ needs.detect-changes.outputs.twelvedata }}
          ANALYSIS_CHANGED: ${{ needs.detect-changes.outputs.analysis }}
          METRICS_CHANGED: ${{ needs.detect-changes.outputs.metrics }}
          BACKOFFICE_CHANGED: ${{ needs.detect-changes.outputs.backoffice }}
          MCP_CHANGED: ${{ needs.detect-changes.outputs.mcp }}
          TELEGRAM2_CHANGED: ${{ needs.detect-changes.outputs.telegram2 }}
          AIHUB2_CHANGED: ${{ needs.detect-changes.outputs.aihub2 }}
          FRONTEND_CHANGED: ${{ needs.detect-changes.outputs.frontend }}
          TWELVEDATA_VERSION: ${{ needs.detect-changes.outputs.twelvedata_version }}
          ANALYSIS_VERSION: ${{ needs.detect-changes.outputs.analysis_version }}
          METRICS_VERSION: ${{ needs.detect-changes.outputs.metrics_version }}
          BACKOFFICE_VERSION: ${{ needs.detect-changes.outputs.backoffice_version }}
          MCP_VERSION: ${{ needs.detect-changes.outputs.mcp_version }}
          TELEGRAM2_VERSION: ${{ needs.detect-changes.outputs.telegram2_version }}
          AIHUB2_VERSION: ${{ needs.detect-changes.outputs.aihub2_version }}
          FRONTEND_VERSION: ${{ needs.detect-changes.outputs.frontend_version }}
          FORCE_BUILD: ${{ github.event.inputs.force_build }}
        run: |
          echo "=========================================="
          echo "=== Updating versions in Supabase ==="
          echo "=========================================="
          
          UPDATED_AT=$(date -u +%Y-%m-%dT%H:%M:%SZ)
          
          update_version() {
            local service=$1
            local version=$2
            local major=$(echo "$version" | cut -d. -f1)
            local minor=$(echo "$version" | cut -d. -f2)
            
            echo "Updating $service to v$version..."
            
            # Upsert using PATCH with conflict handling
            HTTP_CODE=$(curl -sf -o /dev/null -w "%{http_code}" \
              "${SUPABASE_URL}/rest/v1/worker_versions?service=eq.${service}" \
              -X PATCH \
              -H "apikey: ${SUPABASE_KEY}" \
              -H "Authorization: Bearer ${SUPABASE_KEY}" \
              -H "Content-Type: application/json" \
              -H "Prefer: return=minimal" \
              -d "{\"major_version\": ${major}, \"minor_version\": ${minor}, \"updated_at\": \"${UPDATED_AT}\"}")
            
            if [ "$HTTP_CODE" = "204" ] || [ "$HTTP_CODE" = "200" ]; then
              echo "  ✅ $service -> v$version"
            else
              echo "  ⚠️ Failed to update $service (HTTP $HTTP_CODE)"
            fi
          }
          
          # Update versions for deployed services
          [ "$TWELVEDATA_CHANGED" == "true" ] || [ "$FORCE_BUILD" == "true" ] && update_version "twelvedata" "$TWELVEDATA_VERSION"
          [ "$ANALYSIS_CHANGED" == "true" ] || [ "$FORCE_BUILD" == "true" ] && update_version "candlestick-analysis" "$ANALYSIS_VERSION"
          [ "$METRICS_CHANGED" == "true" ] || [ "$FORCE_BUILD" == "true" ] && update_version "metrics" "$METRICS_VERSION"
          [ "$BACKOFFICE_CHANGED" == "true" ] || [ "$FORCE_BUILD" == "true" ] && update_version "back-office" "$BACKOFFICE_VERSION"
          [ "$MCP_CHANGED" == "true" ] || [ "$FORCE_BUILD" == "true" ] && update_version "mcp-analysis" "$MCP_VERSION"
          [ "$TELEGRAM2_CHANGED" == "true" ] || [ "$FORCE_BUILD" == "true" ] && update_version "telegram-bot-2.0" "$TELEGRAM2_VERSION"
          [ "$AIHUB2_CHANGED" == "true" ] || [ "$FORCE_BUILD" == "true" ] && update_version "ai-hub2" "$AIHUB2_VERSION"
          [ "$FRONTEND_CHANGED" == "true" ] || [ "$FORCE_BUILD" == "true" ] && update_version "frontend-staging" "$FRONTEND_VERSION"
          
          echo ""
          echo "✅ Version updates complete"

  # ===========================================
  # Cleanup old caches after successful deploy
  # ===========================================
  cleanup-cache:
    needs: [deploy]
    if: needs.deploy.result == 'success'
    runs-on: ubuntu-latest
    permissions:
      actions: write
    steps:
      - name: Cleanup old BuildKit caches
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          echo "=========================================="
          echo "=== Cleaning up old BuildKit caches ==="
          echo "=========================================="
          
          # Service scopes used in build job
          SCOPES="twelvedata analysis metrics backoffice mcp telegram2 aihub2"
          
          for SCOPE in $SCOPES; do
            echo ""
            echo "--- Processing scope: $SCOPE ---"
            
            # Get all caches for this scope, sorted by last accessed (newest first)
            CACHES=$(gh cache list -R ${{ github.repository }} --key "$SCOPE" --json id,key,lastAccessedAt,sizeInBytes 2>/dev/null \
              | jq 'sort_by(.lastAccessedAt) | reverse' 2>/dev/null || echo "[]")
            
            TOTAL=$(echo "$CACHES" | jq length)
            echo "Found $TOTAL caches for scope $SCOPE"
            
            if [ "$TOTAL" -gt 1 ]; then
              # Keep only the latest (index 0), delete the rest
              echo "$CACHES" | jq -r '.[1:][] | .key' | while read key; do
                echo "  Deleting: $key"
                gh cache delete "$key" -R ${{ github.repository }} 2>/dev/null || true
              done
              echo "  Kept latest, deleted $((TOTAL - 1)) old caches"
            else
              echo "  Only $TOTAL cache(s), nothing to delete"
            fi
          done
          
          # Clean up old buildkit blobs not accessed in last 24 hours
          echo ""
          echo "--- Cleaning old buildkit blobs ---"
          OLD_BLOBS=$(gh cache list -R ${{ github.repository }} --json key,lastAccessedAt 2>/dev/null \
            | jq -r '.[] | select(.key | startswith("buildkit-blob-")) | select((.lastAccessedAt | fromdateiso8601) < (now - 86400)) | .key' 2>/dev/null || true)
          
          if [ -n "$OLD_BLOBS" ]; then
            echo "$OLD_BLOBS" | while read key; do
              echo "  Deleting old blob: $key"
              gh cache delete "$key" -R ${{ github.repository }} 2>/dev/null || true
            done
          else
            echo "  No old blobs to delete"
          fi
          
          echo ""
          echo "=== Cache cleanup complete ==="
          
          # Log final state
          REMAINING=$(gh cache list -R ${{ github.repository }} --json key 2>/dev/null | jq length || echo "unknown")
          echo "Remaining caches: $REMAINING"
