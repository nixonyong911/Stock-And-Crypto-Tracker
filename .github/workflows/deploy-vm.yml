# ===========================================
# Deploy Backend Services to Azure VM
# ===========================================
# ALL OPTIMIZATIONS APPLIED:
# Phase 1: Smart health polling, combined SSH
# Phase 2: GHA builds, BuildKit caching, compressed transfer, auto-fallback
# Phase 3: Selective builds (paths-filter), parallel matrix builds
#
# BASELINE (before optimization): ~8-12 min
# TARGET (Phase 3): ~3-5 min (60-70% faster)
# BEST CASE (config-only): ~1-2 min (skip all builds)
# ===========================================
# Services: n8n, Caddy, TwelveData, Metrics, Candlestick Analysis, AI Hub 2.0, Alloy
# AI Hub: Go-based ai-hub2 container
# Monitoring: Grafana Cloud (via Alloy)
# Secrets: Injected at runtime via Infisical CLI (Machine Identity)
# Infrastructure Config: instruction/reference/infrastructure-config.md
# ===========================================

name: Deploy to Azure VM

on:
  push:
    branches: [main]
    paths:
      - 'services/workers/data-fetcher/TwelveData/**'
      - 'services/workers/analysis/**'
      - 'services/metrics/**'
      - 'services/ai/ai-hub2.0/**'
      - 'services/back-office/**'
      - 'services/mcp/**'
      - 'services/social-media/telegram-2.0/**'
      - 'services/frontend/**'
      - 'services/common/**'
      - 'deployment/vm/**'
      - '.github/workflows/deploy-vm.yml'
  workflow_dispatch:
    inputs:
      force_build:
        description: 'Force rebuild all services (ignore change detection)'
        required: false
        default: 'false'
        type: boolean

jobs:
  # ===========================================
  # PHASE 3: Detect which services changed
  # ===========================================
  detect-changes:
    runs-on: ubuntu-latest
    outputs:
      twelvedata: ${{ steps.filter.outputs.twelvedata }}
      analysis: ${{ steps.filter.outputs.analysis }}
      metrics: ${{ steps.filter.outputs.metrics }}
      backoffice: ${{ steps.filter.outputs.backoffice }}
      mcp: ${{ steps.filter.outputs.mcp }}
      telegram2: ${{ steps.filter.outputs.telegram2 }}
      aihub2: ${{ steps.filter.outputs.aihub2 }}
      frontend: ${{ steps.filter.outputs.frontend }}
      config: ${{ steps.filter.outputs.config }}
      # NOTE: frontend is NOT in any_service because it's built on VM only (needs Infisical staging secrets)
      any_service: ${{ steps.filter.outputs.twelvedata == 'true' || steps.filter.outputs.analysis == 'true' || steps.filter.outputs.metrics == 'true' || steps.filter.outputs.backoffice == 'true' || steps.filter.outputs.mcp == 'true' || steps.filter.outputs.telegram2 == 'true' || steps.filter.outputs.aihub2 == 'true' }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Detect changed paths
        id: filter
        uses: dorny/paths-filter@v3
        with:
          filters: |
            twelvedata:
              - 'services/workers/data-fetcher/TwelveData/**'
              - 'services/common/**'
            analysis:
              - 'services/workers/analysis/**'
              - 'services/common/**'
            metrics:
              - 'services/metrics/**'
              - 'services/common/**'
            backoffice:
              - 'services/back-office/**'
            mcp:
              - 'services/mcp/**'
            telegram2:
              - 'services/social-media/telegram-2.0/**'
            aihub2:
              - 'services/ai/ai-hub2.0/**'
            frontend:
              - 'services/frontend/**'
            config:
              - 'deployment/vm/**'
              - '.github/workflows/deploy-vm.yml'

      - name: Log detected changes
        run: |
          echo "=========================================="
          echo "=== Detected Changes ==="
          echo "=========================================="
          echo "TwelveData: ${{ steps.filter.outputs.twelvedata }}"
          echo "Analysis: ${{ steps.filter.outputs.analysis }}"
          echo "Metrics: ${{ steps.filter.outputs.metrics }}"
          echo "Back Office: ${{ steps.filter.outputs.backoffice }}"
          echo "MCP Analysis: ${{ steps.filter.outputs.mcp }}"
          echo "Telegram Bot 2.0: ${{ steps.filter.outputs.telegram2 }}"
          echo "AI Hub 2.0: ${{ steps.filter.outputs.aihub2 }}"
          echo "Frontend Staging: ${{ steps.filter.outputs.frontend }}"
          echo "Config: ${{ steps.filter.outputs.config }}"
          echo "Force Build: ${{ github.event.inputs.force_build }}"
          
          # Summary
          echo "## 🔍 Change Detection" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "| Service | Changed |" >> $GITHUB_STEP_SUMMARY
          echo "|---------|---------|" >> $GITHUB_STEP_SUMMARY
          echo "| TwelveData | ${{ steps.filter.outputs.twelvedata }} |" >> $GITHUB_STEP_SUMMARY
          echo "| Analysis | ${{ steps.filter.outputs.analysis }} |" >> $GITHUB_STEP_SUMMARY
          echo "| Metrics | ${{ steps.filter.outputs.metrics }} |" >> $GITHUB_STEP_SUMMARY
          echo "| Back Office | ${{ steps.filter.outputs.backoffice }} |" >> $GITHUB_STEP_SUMMARY
          echo "| MCP Analysis | ${{ steps.filter.outputs.mcp }} |" >> $GITHUB_STEP_SUMMARY
          echo "| Telegram Bot 2.0 | ${{ steps.filter.outputs.telegram2 }} |" >> $GITHUB_STEP_SUMMARY
          echo "| AI Hub 2.0 | ${{ steps.filter.outputs.aihub2 }} |" >> $GITHUB_STEP_SUMMARY
          echo "| Frontend Staging | ${{ steps.filter.outputs.frontend }} |" >> $GITHUB_STEP_SUMMARY
          echo "| Config | ${{ steps.filter.outputs.config }} |" >> $GITHUB_STEP_SUMMARY

  # ===========================================
  # Cleanup artifacts (always runs to prevent quota issues)
  # ===========================================
  cleanup-artifacts:
    runs-on: ubuntu-latest
    steps:
      - name: Cleanup old artifacts (keep 3 most recent)
        run: |
          echo "Checking artifact storage..."
          ARTIFACTS=$(gh api repos/${{ github.repository }}/actions/artifacts --paginate)
          TOTAL=$(echo "$ARTIFACTS" | jq '.artifacts | length')
          echo "Found $TOTAL artifacts"
          
          # Keep 3 most recent, delete the rest
          KEEP=3
          if [ "$TOTAL" -gt "$KEEP" ]; then
            echo "Deleting artifacts beyond the $KEEP most recent..."
            echo "$ARTIFACTS" | jq -r '.artifacts | sort_by(.created_at) | reverse | .['$KEEP':][] | .id' | while read id; do
              echo "Deleting artifact $id"
              gh api --method DELETE repos/${{ github.repository }}/actions/artifacts/$id || true
            done
          else
            echo "Only $TOTAL artifacts, no cleanup needed"
          fi
          echo "Cleanup complete"
        env:
          GH_TOKEN: ${{ github.token }}

  # ===========================================
  # PHASE 3: Build only changed services (parallel)
  # ===========================================
  build:
    needs: [detect-changes, cleanup-artifacts]
    runs-on: ubuntu-latest
    # Skip build job entirely if only config changed and not forcing
    if: needs.detect-changes.outputs.any_service == 'true' || github.event.inputs.force_build == 'true'
    outputs:
      build_success: ${{ steps.build-result.outputs.success }}
      images_built: ${{ steps.build-result.outputs.images }}
    
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      # Build TwelveData (only if changed or forced)
      - name: Build TwelveData image
        id: build-twelvedata
        if: needs.detect-changes.outputs.twelvedata == 'true' || github.event.inputs.force_build == 'true'
        continue-on-error: true
        uses: docker/build-push-action@v5
        with:
          context: services/
          file: services/workers/data-fetcher/TwelveData/Dockerfile
          tags: |
            stocktracker-twelvedata:latest
            stocktracker-twelvedata:${{ github.sha }}
          cache-from: type=gha,scope=twelvedata
          cache-to: type=gha,mode=max,scope=twelvedata
          outputs: type=docker,dest=/tmp/twelvedata.tar

      # Build Candlestick Analysis (only if changed or forced)
      - name: Build Candlestick Analysis image
        id: build-analysis
        if: needs.detect-changes.outputs.analysis == 'true' || github.event.inputs.force_build == 'true'
        continue-on-error: true
        uses: docker/build-push-action@v5
        with:
          context: services/
          file: services/workers/analysis/CandlestickAnalysis/Dockerfile
          tags: |
            stocktracker-candlestick-analysis:latest
            stocktracker-candlestick-analysis:${{ github.sha }}
          cache-from: type=gha,scope=analysis
          cache-to: type=gha,mode=max,scope=analysis
          outputs: type=docker,dest=/tmp/candlestick-analysis.tar

      # Build Metrics (only if changed or forced)
      - name: Build Metrics image
        id: build-metrics
        if: needs.detect-changes.outputs.metrics == 'true' || github.event.inputs.force_build == 'true'
        continue-on-error: true
        uses: docker/build-push-action@v5
        with:
          context: services/
          file: services/metrics/StockTracker.Metrics/Dockerfile
          tags: |
            stocktracker-metrics:latest
            stocktracker-metrics:${{ github.sha }}
          cache-from: type=gha,scope=metrics
          cache-to: type=gha,mode=max,scope=metrics
          outputs: type=docker,dest=/tmp/metrics.tar

      # Build Back Office (only if changed or forced)
      - name: Build Back Office image
        id: build-backoffice
        if: needs.detect-changes.outputs.backoffice == 'true' || github.event.inputs.force_build == 'true'
        continue-on-error: true
        uses: docker/build-push-action@v5
        with:
          context: services/back-office/
          file: services/back-office/Dockerfile
          tags: |
            stocktracker-back-office:latest
            stocktracker-back-office:${{ github.sha }}
          build-args: |
            NEXT_PUBLIC_SUPABASE_URL=${{ secrets.NEXT_PUBLIC_SUPABASE_URL }}
            NEXT_PUBLIC_SUPABASE_PUBLISHABLE_DEFAULT_KEY=${{ secrets.NEXT_PUBLIC_SUPABASE_PUBLISHABLE_DEFAULT_KEY }}
          cache-from: type=gha,scope=backoffice
          cache-to: type=gha,mode=max,scope=backoffice
          outputs: type=docker,dest=/tmp/back-office.tar

      # Build MCP Analysis Server (only if changed or forced)
      - name: Build MCP Analysis image
        id: build-mcp
        if: needs.detect-changes.outputs.mcp == 'true' || github.event.inputs.force_build == 'true'
        continue-on-error: true
        uses: docker/build-push-action@v5
        with:
          context: services/mcp/
          file: services/mcp/Dockerfile
          tags: |
            stocktracker-mcp-analysis:latest
            stocktracker-mcp-analysis:${{ github.sha }}
          cache-from: type=gha,scope=mcp
          cache-to: type=gha,mode=max,scope=mcp
          outputs: type=docker,dest=/tmp/mcp-analysis.tar

      # Build Telegram Bot 2.0 (only if changed or forced)
      - name: Build Telegram Bot 2.0 image
        id: build-telegram2
        if: needs.detect-changes.outputs.telegram2 == 'true' || github.event.inputs.force_build == 'true'
        continue-on-error: true
        uses: docker/build-push-action@v5
        with:
          context: services/social-media/telegram-2.0/
          file: services/social-media/telegram-2.0/Dockerfile
          tags: |
            stocktracker-telegram-bot-2.0:latest
            stocktracker-telegram-bot-2.0:${{ github.sha }}
          cache-from: type=gha,scope=telegram2
          cache-to: type=gha,mode=max,scope=telegram2
          outputs: type=docker,dest=/tmp/telegram-bot-2.0.tar

      # Build AI Hub 2.0 (Go) (only if changed or forced)
      - name: Build AI Hub 2.0 image
        id: build-aihub2
        if: needs.detect-changes.outputs.aihub2 == 'true' || github.event.inputs.force_build == 'true'
        continue-on-error: true
        uses: docker/build-push-action@v5
        with:
          context: services/ai/ai-hub2.0/
          file: services/ai/ai-hub2.0/Dockerfile
          tags: |
            stocktracker-ai-hub2:latest
            stocktracker-ai-hub2:${{ github.sha }}
          cache-from: type=gha,scope=aihub2
          cache-to: type=gha,mode=max,scope=aihub2
          outputs: type=docker,dest=/tmp/ai-hub2.tar

      # NOTE: Frontend Staging is NOT built on GHA
      # It must be built on VM with Infisical STAGING secrets (not Production)
      # The start-frontend-staging.sh script handles this during deploy

      # Compress built images
      - name: Compress Docker images
        id: compress
        run: |
          mkdir -p /tmp/images
          BUILT=""
          
          if [ -f /tmp/twelvedata.tar ]; then
            gzip -1 < /tmp/twelvedata.tar > /tmp/images/twelvedata.tar.gz
            BUILT="${BUILT}twelvedata,"
            echo "✅ TwelveData compressed"
          else
            echo "⏭️ TwelveData skipped (unchanged)"
          fi
          
          if [ -f /tmp/candlestick-analysis.tar ]; then
            gzip -1 < /tmp/candlestick-analysis.tar > /tmp/images/candlestick-analysis.tar.gz
            BUILT="${BUILT}analysis,"
            echo "✅ Candlestick Analysis compressed"
          else
            echo "⏭️ Candlestick Analysis skipped (unchanged)"
          fi
          
          if [ -f /tmp/metrics.tar ]; then
            gzip -1 < /tmp/metrics.tar > /tmp/images/metrics.tar.gz
            BUILT="${BUILT}metrics,"
            echo "✅ Metrics compressed"
          else
            echo "⏭️ Metrics skipped (unchanged)"
          fi
          
          if [ -f /tmp/back-office.tar ]; then
            gzip -1 < /tmp/back-office.tar > /tmp/images/back-office.tar.gz
            BUILT="${BUILT}backoffice,"
            echo "✅ Back Office compressed"
          else
            echo "⏭️ Back Office skipped (unchanged)"
          fi
          
          if [ -f /tmp/mcp-analysis.tar ]; then
            gzip -1 < /tmp/mcp-analysis.tar > /tmp/images/mcp-analysis.tar.gz
            BUILT="${BUILT}mcp,"
            echo "✅ MCP Analysis compressed"
          else
            echo "⏭️ MCP Analysis skipped (unchanged)"
          fi
          
          if [ -f /tmp/telegram-bot-2.0.tar ]; then
            gzip -1 < /tmp/telegram-bot-2.0.tar > /tmp/images/telegram-bot-2.0.tar.gz
            BUILT="${BUILT}telegram2,"
            echo "✅ Telegram Bot 2.0 compressed"
          else
            echo "⏭️ Telegram Bot 2.0 skipped (unchanged)"
          fi
          
          if [ -f /tmp/ai-hub2.tar ]; then
            gzip -1 < /tmp/ai-hub2.tar > /tmp/images/ai-hub2.tar.gz
            BUILT="${BUILT}aihub2,"
            echo "✅ AI Hub 2.0 compressed"
          else
            echo "⏭️ AI Hub 2.0 skipped (unchanged)"
          fi
          
          # NOTE: Frontend Staging is built on VM only (needs Infisical staging secrets)
          
          echo "built=$BUILT" >> $GITHUB_OUTPUT
          ls -lh /tmp/images/ 2>/dev/null || echo "No images to transfer"

      # Check build result
      - name: Check build result
        id: build-result
        run: |
          # Check if any images were actually built
          if ls /tmp/images/*.tar.gz 1>/dev/null 2>&1; then
            SUCCESS="true"
            IMAGES="${{ steps.compress.outputs.built }}"
            echo "✅ Build complete: $IMAGES"
          else
            SUCCESS="false"
            IMAGES=""
            echo "⚠️ No images built"
          fi
          
          echo "success=$SUCCESS" >> $GITHUB_OUTPUT
          echo "images=$IMAGES" >> $GITHUB_OUTPUT

      # Upload artifacts
      - name: Upload Docker images
        if: steps.build-result.outputs.success == 'true'
        uses: actions/upload-artifact@v4
        with:
          name: docker-images
          path: /tmp/images/*.tar.gz
          retention-days: 1
          if-no-files-found: warn

      # Log transfer metrics
      - name: Log transfer metrics
        run: |
          echo "## 📦 Build Summary" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          
          if ls /tmp/images/*.tar.gz 1>/dev/null 2>&1; then
            TOTAL_SIZE=$(du -ch /tmp/images/*.tar.gz 2>/dev/null | tail -1 | cut -f1 || echo "0")
            echo "| Image | Size | Status |" >> $GITHUB_STEP_SUMMARY
            echo "|-------|------|--------|" >> $GITHUB_STEP_SUMMARY
            
            for service in twelvedata candlestick-analysis metrics back-office mcp-analysis telegram-bot-2.0 ai-hub2; do
              if [ -f "/tmp/images/${service}.tar.gz" ]; then
                SIZE=$(du -h "/tmp/images/${service}.tar.gz" | cut -f1)
                echo "| $service | $SIZE | ✅ Built |" >> $GITHUB_STEP_SUMMARY
              else
                echo "| $service | - | ⏭️ Skipped |" >> $GITHUB_STEP_SUMMARY
              fi
            done
            
            echo "" >> $GITHUB_STEP_SUMMARY
            echo "**Total transfer**: $TOTAL_SIZE" >> $GITHUB_STEP_SUMMARY
          else
            echo "No images built (all skipped or failed)" >> $GITHUB_STEP_SUMMARY
          fi
          
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "💡 Azure inbound transfer is FREE" >> $GITHUB_STEP_SUMMARY

  # ===========================================
  # Deploy to VM
  # ===========================================
  deploy:
    needs: [detect-changes, build]
    # Always run deploy (even if build was skipped for config-only changes)
    if: always() && !cancelled()
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup SSH
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.VM_SSH_PRIVATE_KEY }}" > ~/.ssh/id_rsa
          chmod 600 ~/.ssh/id_rsa
          ssh-keyscan -H 20.17.176.1 >> ~/.ssh/known_hosts

      # Download pre-built images if available
      - name: Download Docker images
        if: needs.build.outputs.build_success == 'true'
        continue-on-error: true
        uses: actions/download-artifact@v4
        with:
          name: docker-images
          path: ./docker-images

      # ===========================================
      # PRIMARY PATH: Transfer pre-built images
      # ===========================================
      - name: Transfer and load images (GHA build path)
        if: needs.build.outputs.build_success == 'true'
        run: |
          echo "=========================================="
          echo "=== Transferring GHA-built images ==="
          echo "=========================================="
          
          if ls ./docker-images/*.tar.gz 1>/dev/null 2>&1; then
            echo "📤 Transferring images to VM..."
            scp -o ServerAliveInterval=60 ./docker-images/*.tar.gz azureuser@20.17.176.1:/tmp/
            
            ssh -o ServerAliveInterval=60 azureuser@20.17.176.1 'bash -s' << 'EOF'
          set -e
          echo "📥 Loading Docker images..."
          
          # Only load our specific service images (not other .tar.gz files in /tmp)
          # NOTE: Frontend Staging is built on VM, not transferred from GHA
          for NAME in twelvedata candlestick-analysis metrics back-office mcp-analysis telegram-bot-2.0 ai-hub2; do
            img="/tmp/${NAME}.tar.gz"
            if [ -f "$img" ]; then
              echo "Loading $NAME..."
              gunzip -c "$img" | docker load
              rm "$img"
              echo "✅ $NAME loaded"
            fi
          done
          
          echo "✅ Images loaded"
          docker images --format "table {{.Repository}}\t{{.Tag}}\t{{.Size}}" | head -10
          EOF
          else
            echo "⏭️ No images to transfer (all services unchanged)"
          fi

      # ===========================================
      # FALLBACK PATH: Build on VM if needed
      # ===========================================
      - name: Fallback - Build on VM
        if: |
          needs.build.result == 'failure' || 
          (needs.detect-changes.outputs.any_service == 'true' && needs.build.outputs.build_success != 'true')
        run: |
          echo "::warning::GHA build failed or incomplete, falling back to VM build"
          echo "=========================================="
          echo "=== FALLBACK: Building on VM ==="
          echo "=========================================="
          
          ssh -o ServerAliveInterval=60 azureuser@20.17.176.1 'bash -s' << 'EOF'
          set -e
          DEPLOY_PATH="/opt/stocktracker"
          cd $DEPLOY_PATH
          
          echo "📦 Building Docker services on VM (fallback mode)..."
          # NOTE: Frontend Staging is NOT built here - it's built separately with Infisical staging
          DOCKER_BUILDKIT=1 docker compose build twelvedata candlestick-analysis metrics back-office mcp-analysis telegram-bot-2.0 ai-hub2
          
          echo "✅ VM build complete"
          EOF

      # ===========================================
      # Sync config and start services
      # ===========================================
      - name: Sync config and deploy services
        run: |
          ssh -o ServerAliveInterval=60 azureuser@20.17.176.1 'bash -s' << 'EOF'
          set -e
          DEPLOY_PATH="/opt/stocktracker"
          
          echo "=========================================="
          echo "=== Syncing repository ==="
          echo "=========================================="
          cd $DEPLOY_PATH/repo
          git fetch origin main
          git reset --hard origin/main
          
          echo "=== Syncing agent-context to stock-tracker ==="
          rsync -av --delete \
            $DEPLOY_PATH/repo/services/ai/ai-hub2.0/agent-context/stock-tracker/ \
            /home/azureuser/stock-tracker/
          
          echo "=== Copying config files ==="
          cp $DEPLOY_PATH/repo/deployment/vm/docker-compose.yml $DEPLOY_PATH/
          cp $DEPLOY_PATH/repo/deployment/vm/Caddyfile $DEPLOY_PATH/
          cp $DEPLOY_PATH/repo/deployment/vm/alloy-config.alloy $DEPLOY_PATH/
          sudo cp $DEPLOY_PATH/repo/deployment/vm/scripts/*.sh $DEPLOY_PATH/scripts/
          sudo chmod +x $DEPLOY_PATH/scripts/*.sh
          sudo chown azureuser:azureuser $DEPLOY_PATH/scripts/*
          
          echo "=========================================="
          echo "=== Starting services ==="
          echo "=========================================="
          cd $DEPLOY_PATH
          # Docker Compose detects image changes and only recreates affected containers
          ./scripts/start-services.sh up -d
          
          echo "=== Building & Starting frontend-staging (Infisical STAGING env) ==="
          # Build with Infisical staging secrets (NEXT_PUBLIC_* embedded at build time)
          ./scripts/start-frontend-staging.sh --build || echo "⚠️ Frontend staging build/start failed - may need manual intervention"
          
          echo "=== Reloading Caddy config ==="
          docker exec caddy caddy reload --config /etc/caddy/Caddyfile || docker restart caddy
          
          echo "=== Reloading Alloy config ==="
          docker exec alloy wget -qO- http://localhost:12345/-/reload 2>/dev/null || docker restart alloy
          
          echo "=== Cleanup old images ==="
          docker image prune -f
          
          echo "=== Running containers ==="
          docker ps
          EOF

      # ===========================================
      # Smart health polling
      # ===========================================
      - name: Verify deployment (smart health polling)
        run: |
          echo "=========================================="
          echo "=== Smart Health Polling ==="
          echo "=========================================="
          
          wait_healthy() {
            local url=$1
            local name=$2
            local max_attempts=30
            local attempt=0
            
            echo "Waiting for $name..."
            while [ $attempt -lt $max_attempts ]; do
              if curl -sf "$url" > /dev/null 2>&1; then
                echo "✅ $name: OK (${attempt}s)"
                return 0
              fi
              sleep 2
              attempt=$((attempt + 2))
            done
            echo "⚠️ $name: TIMEOUT after ${max_attempts}s"
            return 1
          }
          
          echo ""
          echo "=== Checking services ==="
          curl -sf https://nxserver.malaysiawest.cloudapp.azure.com/ > /dev/null && echo "✅ n8n: OK" || echo "⚠️ n8n: May need login"
          
          wait_healthy "https://nxserver.malaysiawest.cloudapp.azure.com/api/twelvedata/health/live" "TwelveData"
          wait_healthy "https://nxserver.malaysiawest.cloudapp.azure.com/api/analysis/health/live" "Candlestick Analysis"
          wait_healthy "https://nxserver.malaysiawest.cloudapp.azure.com/api/metrics/health/live" "Metrics"
          
          curl -sf https://nxserver.malaysiawest.cloudapp.azure.com/back-office/ > /dev/null && echo "✅ Back Office: OK" || echo "⚠️ Back Office: Starting..."
          
          # Frontend Staging - check via public URL
          curl -sf https://nxserver.malaysiawest.cloudapp.azure.com/front-end > /dev/null && echo "✅ Frontend Staging: OK" || echo "⚠️ Frontend Staging: Starting..."
          
          # AI Hub 2.0 (Go) container - check via SSH
          ssh azureuser@20.17.176.1 'docker exec ai-hub2 wget -qO- http://localhost:8080/health/live' > /dev/null && echo "✅ AI Hub 2.0: OK" || echo "⚠️ AI Hub 2.0: Check Docker logs"
          
          # MCP Analysis runs on internal port 8085 - check via SSH
          ssh azureuser@20.17.176.1 'curl -sf http://localhost:8085/health' > /dev/null && echo "✅ MCP Analysis: OK" || echo "⚠️ MCP Analysis: Check Docker logs"
          
          # Telegram Bot 2.0 (webhook mode) - check via SSH
          ssh azureuser@20.17.176.1 'docker exec telegram-bot-2.0 wget -qO- http://localhost:8087/health' > /dev/null && echo "✅ Telegram Bot 2.0: OK" || echo "⚠️ Telegram Bot 2.0: Check Docker logs"
          
          ssh azureuser@20.17.176.1 'docker ps --filter name=alloy --format "{{.Status}}"' || echo "⚠️ Alloy: Check logs"
          
