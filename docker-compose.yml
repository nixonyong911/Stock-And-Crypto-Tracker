version: '3.8'

# ===========================================
# Stock and Crypto Tracker - Docker Compose
# ===========================================
# Usage:
#   Staging:    docker-compose --env-file .env.staging up -d
#   Production: docker-compose --env-file .env.prod up -d
# ===========================================

services:
  # ===========================================
  # Metrics Service (Central Metrics Aggregation)
  # All workers push metrics here, Prometheus scrapes from here
  # ===========================================
  metrics-service:
    build:
      context: ./services/metrics/StockTracker.Metrics
      dockerfile: Dockerfile
    container_name: stocktracker-metrics
    restart: unless-stopped
    environment:
      - ASPNETCORE_ENVIRONMENT=Production
    ports:
      # API & Prometheus metrics endpoint
      - "${METRICS_SERVICE_PORT:-8082}:8080"
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8080/health/live"]
      interval: 30s
      timeout: 3s
      retries: 3
      start_period: 10s
    networks:
      - stocktracker-network

  # ===========================================
  # Data Fetcher: Alpha Vantage (Stock Data)
  # ===========================================
  alpha-vantage-fetcher:
    build:
      context: ./services
      dockerfile: data-fetchers/AlphaVantage/Dockerfile
    container_name: stocktracker-alpha-vantage
    restart: unless-stopped
    environment:
      # Supabase Configuration
      - Supabase__Url=${NEXT_PUBLIC_SUPABASE_URL}
      - Supabase__AnonKey=${NEXT_PUBLIC_SUPABASE_PUBLISHABLE_DEFAULT_KEY}
      - Supabase__ServiceRoleKey=${SUPABASE_SECRET_DEFAULT_KEY}
      # Database (Supabase PostgreSQL pooler)
      - ConnectionStrings__DefaultConnection=${DATABASE_CONNECTION_STRING}
      # Alpha Vantage API
      - AlphaVantage__ApiKey=${ALPHA_VANTAGE_API_KEY}
      - AlphaVantage__BaseUrl=https://www.alphavantage.co
      - AlphaVantage__FetchIntervalMinutes=${ALPHA_VANTAGE_FETCH_INTERVAL:-60}
      - AlphaVantage__Symbols=${ALPHA_VANTAGE_SYMBOLS:-AAPL,GOOGL,MSFT,AMZN,TSLA}
      # Metrics Service
      - MetricsService__BaseUrl=http://metrics-service:8080
      - MetricsService__WorkerName=alphavantage
      - MetricsService__Enabled=true
      # Environment
      - ASPNETCORE_ENVIRONMENT=${ASPNETCORE_ENVIRONMENT:-Production}
    ports:
      - "${ALPHA_VANTAGE_API_PORT:-8081}:8080"
    depends_on:
      metrics-service:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8080/health/live"]
      interval: 30s
      timeout: 3s
      retries: 3
      start_period: 15s
    networks:
      - stocktracker-network

  # ===========================================
  # Data Fetcher: TwelveData (Stock Data - 15min candles)
  # ===========================================
  twelvedata-fetcher:
    build:
      context: ./services
      dockerfile: data-fetchers/TwelveData/Dockerfile
    container_name: stocktracker-twelvedata
    restart: unless-stopped
    environment:
      # Database (Supabase PostgreSQL pooler)
      - ConnectionStrings__DefaultConnection=${DATABASE_CONNECTION_STRING}
      # TwelveData API
      - TwelveData__ApiKey=${TWELVE_DATA_API_KEY}
      - TwelveData__BaseUrl=https://api.twelvedata.com
      - TwelveData__FetchIntervalMinutes=${TWELVE_DATA_FETCH_INTERVAL:-15}
      - TwelveData__OutputSize=${TWELVE_DATA_OUTPUT_SIZE:-96}
      - TwelveData__Interval=15min
      - TwelveData__Exchange=NASDAQ
      - TwelveData__Timezone=America/New_York
      # Environment
      - ASPNETCORE_ENVIRONMENT=${ASPNETCORE_ENVIRONMENT:-Production}
    ports:
      - "${TWELVEDATA_API_PORT:-8083}:8080"
    depends_on:
      metrics-service:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8080/health/live"]
      interval: 30s
      timeout: 3s
      retries: 3
      start_period: 15s
    networks:
      - stocktracker-network

  # ===========================================
  # AI Hub Service (Multi-Model AI Gateway)
  # Provides centralized AI access for all workers
  # ===========================================
  ai-hub:
    build:
      context: ./services/ai/ai-hub
      dockerfile: Dockerfile
    container_name: stocktracker-ai-hub
    restart: unless-stopped
    environment:
      # Database (Supabase PostgreSQL)
      - DATABASE_URL=${DATABASE_CONNECTION_STRING}
      # Google Cloud Project (for rate limit tracking)
      - GOOGLE_CLOUD_PROJECT_ID=${GOOGLE_CLOUD_PROJECT_ID:-default-project}
      # Model Registry
      - AI_HUB_MODELS=${AI_HUB_MODELS:-api-stockandcryptotracker-google-gemini-3-flash}
      # Gemini API Key
      - AI_KEY_API_STOCKANDCRYPTOTRACKER_GOOGLE_GEMINI_3_FLASH=${AI_KEY_API_STOCKANDCRYPTOTRACKER_GOOGLE_GEMINI_3_FLASH}
      # Rate Limits (Free tier defaults)
      - AI_HUB_GEMINI_RPM_LIMIT=${AI_HUB_GEMINI_RPM_LIMIT:-15}
      - AI_HUB_GEMINI_TPM_LIMIT=${AI_HUB_GEMINI_TPM_LIMIT:-1000000}
      - AI_HUB_GEMINI_RPD_LIMIT=${AI_HUB_GEMINI_RPD_LIMIT:-1500}
      # Retry Config
      - AI_HUB_MAX_RETRIES=${AI_HUB_MAX_RETRIES:-3}
      - AI_HUB_TIMEOUT_SECONDS=${AI_HUB_TIMEOUT_SECONDS:-30}
    ports:
      - "${AI_HUB_PORT:-8084}:8080"
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8080/health/live"]
      interval: 30s
      timeout: 3s
      retries: 3
      start_period: 15s
    networks:
      - stocktracker-network

  # ===========================================
  # Frontend: Now hosted on Vercel
  # See: https://vercel.com (configured separately)
  # ===========================================

