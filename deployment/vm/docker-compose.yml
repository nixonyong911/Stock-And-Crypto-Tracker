# ===========================================
# Stock and Crypto Tracker - VM Deployment
# ===========================================
# This file is synced from the repo via CI/CD
# Do NOT edit directly on the VM
# ===========================================

services:
  # ===========================================
  # NOTE: CaddyManager removed - image not publicly accessible
  # Caddy Admin API available at localhost:2019 via SSH
  # ===========================================

  # ===========================================
  # Caddy - Reverse Proxy with Auto HTTPS
  # ===========================================
  caddy:
    image: caddy:2-alpine
    container_name: caddy
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
    environment:
      - CADDY_ADMIN=0.0.0.0:2019
    volumes:
      - ./Caddyfile:/etc/caddy/Caddyfile:ro
      - caddy-data:/data
      - caddy-config:/config
    networks:
      - stocktracker

  # ===========================================
  # n8n - Workflow Automation
  # Access at: / (root)
  # ===========================================
  n8n:
    image: n8nio/n8n:latest
    container_name: n8n
    restart: unless-stopped
    extra_hosts:
      - "host.docker.internal:host-gateway"
    environment:
      - N8N_HOST=0.0.0.0
      - N8N_PORT=5678
      - WEBHOOK_URL=https://nxserver.malaysiawest.cloudapp.azure.com
      - N8N_PROTOCOL=https
      - N8N_EDITOR_BASE_URL=https://nxserver.malaysiawest.cloudapp.azure.com
      - TZ=Asia/Singapore
      # Gateway 2.0 (TypeScript) access (Docker internal)
      - AI_HUB_URL=http://gateway-2.0:8080
      - AI_HUB_API_KEY=${AI_HUB_API_KEY}
    volumes:
      - ./n8n-data:/home/node/.n8n
    networks:
      - stocktracker
    depends_on:
      - gateway-2.0

  # ===========================================
  # TwelveData Worker
  # Swagger at: /api/twelvedata/swagger
  # ===========================================
  twelvedata:
    image: stocktracker-twelvedata:${TWELVEDATA_VERSION:-latest}
    build:
      context: ./repo/services
      dockerfile: workers/data-fetcher/TwelveData/Dockerfile
    container_name: twelvedata
    restart: unless-stopped
    extra_hosts:
      - "host.docker.internal:host-gateway"
    environment:
      - ASPNETCORE_ENVIRONMENT=Production
      - ASPNETCORE_URLS=http://+:8080
      # Path base for reverse proxy (tells Swagger to prefix API URLs)
      - PATH_BASE=/api/twelvedata
      # Secrets from Infisical (mapped to .NET config format)
      # Using direct connection for best performance (bypasses pooler)
      - ConnectionStrings__DefaultConnection=${DATABASE_URL_NET_DIRECT}
      - TwelveData__ApiKey=${TWELVE_DATA_API_KEY}
      - TwelveData__BaseUrl=https://api.twelvedata.com
      # RabbitMQ for historical backfill queue
      - RabbitMQ__HostName=rabbitmq
      - RabbitMQ__UserName=stocktracker
      - RabbitMQ__Password=${RABBITMQ_PASSWORD}
      - RabbitMQ__QueueName=backfill-queue
      # Gateway 2.0 (TypeScript) access (Docker internal)
      - AI_HUB_URL=http://gateway-2.0:8080
      - AI_HUB_API_KEY=${AI_HUB_API_KEY}
    networks:
      - stocktracker
    depends_on:
      - gateway-2.0
      - rabbitmq
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8080/health/live"]
      interval: 30s
      timeout: 3s
      retries: 3
      start_period: 30s

  # ===========================================
  # Candlestick Analysis Worker
  # Swagger at: /api/analysis/swagger
  # ===========================================
  candlestick-analysis:
    image: stocktracker-candlestick-analysis:${CANDLESTICK_ANALYSIS_VERSION:-latest}
    build:
      context: ./repo/services
      dockerfile: workers/analysis/CandlestickAnalysis/Dockerfile
    container_name: candlestick-analysis
    restart: unless-stopped
    extra_hosts:
      - "host.docker.internal:host-gateway"
    environment:
      - ASPNETCORE_ENVIRONMENT=Production
      - ASPNETCORE_URLS=http://+:8080
      # Path base for reverse proxy
      - PATH_BASE=/api/analysis
      # Database connection
      - ConnectionStrings__DefaultConnection=${DATABASE_CONNECTION_STRING}
      # Metrics service for pushing metrics
      - MetricsService__BaseUrl=http://metrics:8080
      - MetricsService__WorkerName=candlestick-analysis
      - MetricsService__Enabled=true
      # RabbitMQ for analysis backfill queue
      - RabbitMQ__HostName=rabbitmq
      - RabbitMQ__UserName=stocktracker
      - RabbitMQ__Password=${RABBITMQ_PASSWORD}
      - RabbitMQ__QueueName=analysis-backfill-queue
    networks:
      - stocktracker
    depends_on:
      - metrics
      - rabbitmq
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8080/health/live"]
      interval: 30s
      timeout: 3s
      retries: 3
      start_period: 30s

  # ===========================================
  # FRED Worker - Economic Indicators
  # API at: /api/fred/*
  # ===========================================
  fred-worker:
    image: stocktracker-fred:${FRED_VERSION:-latest}
    build:
      context: ./repo/services/workers/data-fetcher/fred-worker
      dockerfile: Dockerfile
    container_name: fred-worker
    restart: unless-stopped
    environment:
      # Database connection (Go format)
      - DATABASE_URL=${DATABASE_URL_GO}
      # FRED API key
      - FRED_API_KEY=${FRED_API_KEY}
      # Schedule: 08:00 AM Eastern Time
      - SCHEDULE_TIME=08:00
      - SCHEDULE_TIMEZONE=America/New_York
      # HTTP server port
      - HTTP_PORT=8080
      # Metrics service for pushing metrics
      - METRICS_SERVICE_URL=http://metrics:8080
    networks:
      - stocktracker
    depends_on:
      - metrics
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:8080/health/live"]
      interval: 30s
      timeout: 3s
      retries: 3
      start_period: 10s

  # ===========================================
  # Data Fetcher 2.0 - Centralized Multi-Provider Data Fetcher
  # Swagger at: /api/data-fetcher-2.0/swagger
  # Providers: Finnhub (fundamentals), Alpha Vantage (earnings calendar)
  # ===========================================
  data-fetcher-2.0:
    image: stocktracker-data-fetcher-2.0:${DATA_FETCHER_2_VERSION:-latest}
    build:
      context: ./repo/services
      dockerfile: workers/data-fetcher-2.0/Dockerfile
    container_name: data-fetcher-2.0
    restart: unless-stopped
    environment:
      - ASPNETCORE_ENVIRONMENT=Production
      - ASPNETCORE_URLS=http://+:8080
      # Path base for reverse proxy
      - PATH_BASE=/api/data-fetcher-2.0
      # Database connection (direct, bypasses pooler for best performance)
      - ConnectionStrings__DefaultConnection=${DATABASE_URL_NET_DIRECT}
      # Finnhub Provider (stock fundamentals)
      - Providers__Finnhub__ApiKey=${FINNHUB_API_KEY}
      - Providers__Finnhub__BaseUrl=https://finnhub.io/api/v1
      - Providers__Finnhub__RateLimitDelayMs=2000
      # Alpha Vantage Provider (earnings calendar)
      - Providers__AlphaVantage__ApiKey=${ALPHA_VANTAGE_API_KEY}
      - Providers__AlphaVantage__BaseUrl=https://www.alphavantage.co
      - Providers__AlphaVantage__RateLimitDelayMs=12000
      - Providers__AlphaVantage__Horizon=6month
      # Massive Provider (technical indicators: SMA, EMA, MACD, RSI)
      - Providers__Massive__ApiKey=${MASSIVE_API_KEY}
      - Providers__Massive__BaseUrl=https://api.massive.com/v1
      - Providers__Massive__RateLimitDelayMs=12000
      - Providers__Massive__Timespan=minute
      - Providers__Massive__Limit=390
      - Providers__Massive__BackfillLimit=5000
      - Providers__Massive__BackfillDays=90
      # RabbitMQ connection (for Massive indicator queue)
      - RabbitMQ__HostName=rabbitmq
      - RabbitMQ__UserName=stocktracker
      - RabbitMQ__Password=${RABBITMQ_PASSWORD}
      - RabbitMQ__MassiveQueueName=massive-indicator-queue
      # Metrics service
      - MetricsService__BaseUrl=http://metrics:8080
      - MetricsService__WorkerName=data-fetcher-2.0
      - MetricsService__Enabled=true
    networks:
      - stocktracker
    depends_on:
      metrics:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8080/health/live"]
      interval: 30s
      timeout: 3s
      retries: 3
      start_period: 30s

  # ===========================================
  # Metrics Service
  # Swagger at: /api/metrics/swagger
  # Prometheus metrics at: /metrics
  # ===========================================
  metrics:
    image: stocktracker-metrics:${METRICS_VERSION:-latest}
    build:
      context: ./repo/services
      dockerfile: metrics/StockTracker.Metrics/Dockerfile
    container_name: metrics
    restart: unless-stopped
    extra_hosts:
      - "host.docker.internal:host-gateway"
    environment:
      - ASPNETCORE_ENVIRONMENT=Production
      - ASPNETCORE_URLS=http://+:8080
      - PATH_BASE=/api/metrics
      # Gateway 2.0 (TypeScript) access (Docker internal)
      - AI_HUB_URL=http://gateway-2.0:8080
      - AI_HUB_API_KEY=${AI_HUB_API_KEY}
    networks:
      - stocktracker
    depends_on:
      - gateway-2.0
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8080/health/live"]
      interval: 30s
      timeout: 3s
      retries: 3
      start_period: 30s

  # ===========================================
  # Grafana Alloy - Metrics & Logs Forwarder
  # Scrapes local services and forwards to Grafana Cloud
  # ===========================================
  alloy:
    image: grafana/alloy:latest
    container_name: alloy
    restart: unless-stopped
    volumes:
      - ./alloy-config.alloy:/etc/alloy/config.alloy:ro
      # Host logs: journal (ai-hub) + weekly cleanup script logs
      - /var/log:/var/log:ro
      - /run/log/journal:/run/log/journal:ro
      - /etc/machine-id:/etc/machine-id:ro
    command:
      [
        "run",
        "/etc/alloy/config.alloy",
        "--server.http.listen-addr=0.0.0.0:12345",
      ]
    environment:
      - GRAFANA_CLOUD_API_KEY=${GRAFANA_CLOUD_API_KEY}
      # Loki user ID from Grafana Cloud > Connections > Loki
      - GRAFANA_CLOUD_LOKI_USER=${GRAFANA_CLOUD_LOKI_USER}
    networks:
      - stocktracker
    depends_on:
      - metrics
      - twelvedata
      - candlestick-analysis

  # ===========================================
  # Redis - Caching for MCP Server & Queue Locks
  # ===========================================
  redis:
    image: redis:7-alpine
    container_name: redis
    restart: unless-stopped
    command: redis-server --appendonly yes --maxmemory 128mb --maxmemory-policy allkeys-lru
    volumes:
      - redis-data:/data
    networks:
      - stocktracker
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 3s
      retries: 3

  # ===========================================
  # RabbitMQ - Message Queue for Telegram Bot
  # Management UI at: localhost:15672 (internal)
  # ===========================================
  rabbitmq:
    image: rabbitmq:3-management-alpine
    container_name: rabbitmq
    restart: unless-stopped
    environment:
      - RABBITMQ_DEFAULT_USER=stocktracker
      - RABBITMQ_DEFAULT_PASS=${RABBITMQ_PASSWORD}
    volumes:
      - rabbitmq-data:/var/lib/rabbitmq
    networks:
      - stocktracker
    healthcheck:
      test: ["CMD", "rabbitmq-diagnostics", "-q", "ping"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s

  # ===========================================
  # MCP Analysis Server - Read-only DB Queries for AI
  # Port: 8085 (internal, accessed by n8n)
  # ===========================================
  mcp-analysis:
    image: stocktracker-mcp-analysis:${MCP_ANALYSIS_VERSION:-latest}
    build:
      context: ./repo/services/mcp
      dockerfile: Dockerfile
    container_name: mcp-analysis
    restart: unless-stopped
    environment:
      - DATABASE_URL_PYTHON=${DATABASE_URL_PYTHON}
      - MCP_PORT=8085
      - REDIS_HOST=redis
      - REDIS_PORT=6379
    ports:
      - "8085:8085"
    networks:
      - stocktracker
    depends_on:
      - redis
    healthcheck:
      test:
        [
          "CMD",
          "python",
          "-c",
          "import socket; s=socket.socket(); s.settimeout(2); s.connect(('localhost',8085)); s.close()",
        ]
      interval: 30s
      timeout: 3s
      retries: 3
      start_period: 10s

  # ===========================================
  # Gateway 2.0 - TypeScript AI Gateway (replaces gateway + ai-hub2 + telegram-bot-2.0)
  # Self-contained: cursor-agent + agent-context + tier-homes baked in
  # Port: 8083 (external), 8080 (internal)
  # ===========================================
  gateway-2.0:
    image: stocktracker-gateway-2.0:${GATEWAY_2_VERSION:-latest}
    build:
      context: ./repo/services/ai/gateway-2.0
      dockerfile: Dockerfile
    container_name: gateway-2.0
    restart: unless-stopped
    ports:
      - "8083:8080"
    environment:
      - PORT=8080
      - AI_HUB_API_KEY=${AI_HUB_API_KEY}
      - GATEWAY_DEFAULT_MODEL=sonnet-4.5
      - GATEWAY_CONTEXT_PATH=/app/agent-context
      - GATEWAY_TIER_HOMES_PATH=/app/tier-homes
      - DATABASE_URL=${DATABASE_URL_GO}
      - REDIS_URL=redis://redis:6379
      - TELEGRAM_BOT_TOKEN=${TELEGRAM_BOT_TOKEN}
      - TELEGRAM_WEBHOOK_URL=https://nxserver.malaysiawest.cloudapp.azure.com/telegram/webhook
      - PATH=/home/azureuser/.local/bin:/usr/local/sbin:/usr/local/bin:/usr/sbin:/usr/bin:/sbin:/bin
    volumes:
      # cursor-agent CLI: mount the entire versions dir (contains node binary + JS chunks)
      # The bash wrapper script resolves SCRIPT_DIR via realpath, so the directory containing
      # the script must also contain 'node', 'index.js', etc.
      - /home/azureuser/.local/share/cursor-agent:/home/azureuser/.local/share/cursor-agent:ro
      # cursor-agent OAuth token (read-only, symlinked into tier-homes)
      - /home/azureuser/.config/cursor:/root/.config/cursor:ro
    networks:
      - stocktracker
    depends_on:
      - redis
    healthcheck:
      test: ["CMD", "curl", "-sf", "http://localhost:8080/health/live"]
      interval: 30s
      timeout: 3s
      retries: 3
      start_period: 20s

  # ===========================================
  # Back Office - Admin & Testing UI
  # Access at: /back-office
  # ===========================================
  back-office:
    image: stocktracker-back-office:${BACK_OFFICE_VERSION:-latest}
    build:
      context: ./repo/services/back-office
      dockerfile: Dockerfile
    container_name: back-office
    restart: unless-stopped
    extra_hosts:
      - "host.docker.internal:host-gateway"
    environment:
      # Gateway 2.0 (TypeScript) access (Docker internal)
      - AI_HUB_URL=http://gateway-2.0:8080
      - AI_HUB_API_KEY=${AI_HUB_API_KEY}
      # Supabase (server-side, service role key)
      - SUPABASE_URL=${SUPABASE_URL}
      - SUPABASE_SERVICE_ROLE_KEY=${SUPABASE_SERVICE_ROLE_KEY}
      # Redis (VM local)
      - REDIS_URL=redis://redis:6379
      # RabbitMQ Management API (for monitoring)
      - RABBITMQ_MANAGEMENT_URL=http://rabbitmq:15672
      - RABBITMQ_PASSWORD=${RABBITMQ_PASSWORD}
    networks:
      - stocktracker
    depends_on:
      - gateway-2.0
      - redis
      - rabbitmq
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://127.0.0.1:3000/back-office"]
      interval: 30s
      timeout: 3s
      retries: 3
      start_period: 30s

  # NOTE: Frontend is deployed via Vercel, not on VM

networks:
  stocktracker:
    driver: bridge
    enable_ipv6: true
    ipam:
      config:
        - subnet: 172.18.0.0/16
        - subnet: fd00:db8:2::/64

volumes:
  caddy-data:
  caddy-config:
  redis-data:
  rabbitmq-data:
