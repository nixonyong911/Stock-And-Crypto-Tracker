# ===========================================
# Stock and Crypto Tracker - VM Deployment
# ===========================================
# This file is synced from the repo via CI/CD
# Do NOT edit directly on the VM
# ===========================================

services:
  # ===========================================
  # NOTE: CaddyManager removed - image not publicly accessible
  # Caddy Admin API available at localhost:2019 via SSH
  # ===========================================

  # ===========================================
  # Caddy - Reverse Proxy with Auto HTTPS
  # ===========================================
  caddy:
    image: caddy:2-alpine
    container_name: caddy
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
    environment:
      - CADDY_ADMIN=0.0.0.0:2019
    volumes:
      - ./Caddyfile:/etc/caddy/Caddyfile:ro
      - caddy-data:/data
      - caddy-config:/config
    networks:
      - stocktracker

  # ===========================================
  # n8n - Workflow Automation
  # Access at: / (root)
  # ===========================================
  n8n:
    image: n8nio/n8n:latest
    container_name: n8n
    restart: unless-stopped
    environment:
      - N8N_HOST=0.0.0.0
      - N8N_PORT=5678
      - WEBHOOK_URL=https://nxserver.malaysiawest.cloudapp.azure.com
      - N8N_PROTOCOL=https
      - N8N_EDITOR_BASE_URL=https://nxserver.malaysiawest.cloudapp.azure.com
      - TZ=Asia/Singapore
    volumes:
      - ./n8n-data:/home/node/.n8n
    networks:
      - stocktracker

  # ===========================================
  # TwelveData Worker
  # Swagger at: /api/twelvedata/swagger
  # ===========================================
  twelvedata:
    build:
      context: ./repo/services
      dockerfile: data-fetchers/TwelveData/Dockerfile
    container_name: twelvedata
    restart: unless-stopped
    environment:
      - ASPNETCORE_ENVIRONMENT=Production
      - ASPNETCORE_URLS=http://+:8080
      # Path base for reverse proxy (tells Swagger to prefix API URLs)
      - PATH_BASE=/api/twelvedata
      # Secrets from Infisical (mapped to .NET config format)
      - ConnectionStrings__DefaultConnection=${DATABASE_CONNECTION_STRING}
      - TwelveData__ApiKey=${TWELVE_DATA_API_KEY}
      - TwelveData__BaseUrl=https://api.twelvedata.com
    networks:
      - stocktracker
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8080/health/live"]
      interval: 30s
      timeout: 3s
      retries: 3
      start_period: 30s

  # ===========================================
  # Metrics Service - DISABLED (Phase 2)
  # Swagger at: /api/metrics/swagger
  # ===========================================
