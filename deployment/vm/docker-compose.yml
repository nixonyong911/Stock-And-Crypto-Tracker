# ===========================================
# Stock and Crypto Tracker - VM Deployment
# ===========================================
# This file is synced from the repo via CI/CD
# Do NOT edit directly on the VM
# ===========================================

services:
  # ===========================================
  # NOTE: CaddyManager removed - image not publicly accessible
  # Caddy Admin API available at localhost:2019 via SSH
  # ===========================================

  # ===========================================
  # Caddy - Reverse Proxy with Auto HTTPS
  # ===========================================
  caddy:
    image: caddy:2-alpine
    container_name: caddy
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
    environment:
      - CADDY_ADMIN=0.0.0.0:2019
    volumes:
      - ./Caddyfile:/etc/caddy/Caddyfile:ro
      - caddy-data:/data
      - caddy-config:/config
    networks:
      - stocktracker

  # ===========================================
  # n8n - Workflow Automation
  # Access at: / (root)
  # ===========================================
  n8n:
    image: n8nio/n8n:latest
    container_name: n8n
    restart: unless-stopped
    extra_hosts:
      - "host.docker.internal:host-gateway"
    environment:
      - N8N_HOST=0.0.0.0
      - N8N_PORT=5678
      - WEBHOOK_URL=https://nxserver.malaysiawest.cloudapp.azure.com
      - N8N_PROTOCOL=https
      - N8N_EDITOR_BASE_URL=https://nxserver.malaysiawest.cloudapp.azure.com
      - TZ=Asia/Singapore
      # AI Hub access (for workflow automation with AI)
      - AI_HUB_URL=http://host.docker.internal:8084
      - AI_HUB_API_KEY=${AI_HUB_API_KEY}
    volumes:
      - ./n8n-data:/home/node/.n8n
    networks:
      - stocktracker

  # ===========================================
  # TwelveData Worker
  # Swagger at: /api/twelvedata/swagger
  # ===========================================
  twelvedata:
    build:
      context: ./repo/services
      dockerfile: workers/data-fetcher/TwelveData/Dockerfile
    container_name: twelvedata
    restart: unless-stopped
    extra_hosts:
      - "host.docker.internal:host-gateway"
    environment:
      - ASPNETCORE_ENVIRONMENT=Production
      - ASPNETCORE_URLS=http://+:8080
      # Path base for reverse proxy (tells Swagger to prefix API URLs)
      - PATH_BASE=/api/twelvedata
      # Secrets from Infisical (mapped to .NET config format)
      - ConnectionStrings__DefaultConnection=${DATABASE_CONNECTION_STRING}
      - TwelveData__ApiKey=${TWELVE_DATA_API_KEY}
      - TwelveData__BaseUrl=https://api.twelvedata.com
      # AI Hub access (for future AI analysis features)
      - AI_HUB_URL=http://host.docker.internal:8084
      - AI_HUB_API_KEY=${AI_HUB_API_KEY}
    networks:
      - stocktracker
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8080/health/live"]
      interval: 30s
      timeout: 3s
      retries: 3
      start_period: 30s

  # ===========================================
  # Candlestick Analysis Worker
  # Swagger at: /api/analysis/swagger
  # ===========================================
  candlestick-analysis:
    build:
      context: ./repo/services
      dockerfile: workers/analysis/CandlestickAnalysis/Dockerfile
    container_name: candlestick-analysis
    restart: unless-stopped
    extra_hosts:
      - "host.docker.internal:host-gateway"
    environment:
      - ASPNETCORE_ENVIRONMENT=Production
      - ASPNETCORE_URLS=http://+:8080
      # Path base for reverse proxy
      - PATH_BASE=/api/analysis
      # Database connection
      - ConnectionStrings__DefaultConnection=${DATABASE_CONNECTION_STRING}
      # Metrics service for pushing metrics
      - MetricsService__BaseUrl=http://metrics:8080
      - MetricsService__WorkerName=candlestick-analysis
      - MetricsService__Enabled=true
    networks:
      - stocktracker
    depends_on:
      - metrics
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8080/health/live"]
      interval: 30s
      timeout: 3s
      retries: 3
      start_period: 30s

  # ===========================================
  # Metrics Service
  # Swagger at: /api/metrics/swagger
  # Prometheus metrics at: /metrics
  # ===========================================
  metrics:
    build:
      context: ./repo/services
      dockerfile: metrics/StockTracker.Metrics/Dockerfile
    container_name: metrics
    restart: unless-stopped
    extra_hosts:
      - "host.docker.internal:host-gateway"
    environment:
      - ASPNETCORE_ENVIRONMENT=Production
      - ASPNETCORE_URLS=http://+:8080
      - PATH_BASE=/api/metrics
      # AI Hub access (for future AI analysis features)
      - AI_HUB_URL=http://host.docker.internal:8084
      - AI_HUB_API_KEY=${AI_HUB_API_KEY}
    networks:
      - stocktracker
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8080/health/live"]
      interval: 30s
      timeout: 3s
      retries: 3
      start_period: 30s

  # ===========================================
  # Grafana Alloy - Metrics & Logs Forwarder
  # Scrapes local services and forwards to Grafana Cloud
  # Also collects ai-hub logs from systemd journal
  # ===========================================
  alloy:
    image: grafana/alloy:latest
    container_name: alloy
    restart: unless-stopped
    volumes:
      - ./alloy-config.alloy:/etc/alloy/config.alloy:ro
      # Host logs: journal (ai-hub) + weekly cleanup script logs
      - /var/log:/var/log:ro
      - /run/log/journal:/run/log/journal:ro
      - /etc/machine-id:/etc/machine-id:ro
    command: ["run", "/etc/alloy/config.alloy", "--server.http.listen-addr=0.0.0.0:12345"]
    environment:
      - GRAFANA_CLOUD_API_KEY=${GRAFANA_CLOUD_API_KEY}
      # Loki user ID from Grafana Cloud > Connections > Loki
      - GRAFANA_CLOUD_LOKI_USER=${GRAFANA_CLOUD_LOKI_USER}
    networks:
      - stocktracker
    depends_on:
      - metrics
      - twelvedata
      - candlestick-analysis

  # ===========================================
  # MCP Analysis Server - Read-only DB Queries for AI
  # Port: 8085 (internal, accessed by n8n)
  # ===========================================
  mcp-analysis:
    build:
      context: ./repo/services/mcp
      dockerfile: Dockerfile
    container_name: mcp-analysis
    restart: unless-stopped
    environment:
      - DATABASE_URL=${DATABASE_CONNECTION_STRING}
      - MCP_PORT=8085
    ports:
      - "8085:8085"
    networks:
      - stocktracker
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8085/health')"]
      interval: 30s
      timeout: 3s
      retries: 3
      start_period: 10s

  # ===========================================
  # Telegram Bot - Financial AI Assistant
  # Port: 8087 (internal, polling mode)
  # ===========================================
  telegram-bot:
    image: telegram-bot:latest
    build:
      context: ./repo/services/social-media/telegram
      dockerfile: Dockerfile
    container_name: telegram-bot
    restart: unless-stopped
    extra_hosts:
      - "host.docker.internal:host-gateway"
    environment:
      - TELEGRAM_BOT_TOKEN=${TELEGRAM_BOT_TOKEN}
      - TELEGRAM_OTP_BOT_TOKEN=${TELEGRAM_OTP_BOT_TOKEN}
      - DATABASE_URL=${DATABASE_CONNECTION_STRING}
      - AI_HUB_URL=http://host.docker.internal:8084
      - AI_HUB_API_KEY=${AI_HUB_API_KEY}
      - BOT_PORT=8087
    ports:
      - "8087:8087"
    networks:
      - stocktracker
    depends_on:
      - mcp-analysis
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8087/health')"]
      interval: 30s
      timeout: 3s
      retries: 3
      start_period: 15s

  # ===========================================
  # AI Hub - Runs on HOST (not Docker)
  # ===========================================
  # AI Hub runs as a systemd service directly on the VM host
  # to access CLIs (claude, cursor-agent) installed on the host.
  # 
  # Service: /etc/systemd/system/ai-hub.service
  # Port: 8084 (internal only - NOT exposed via Caddy)
  # Access: Containers use host.docker.internal:8084 + X-API-Key header
  # ===========================================

  # ===========================================
  # Back Office - Admin & Testing UI
  # Access at: /back-office
  # ===========================================
  back-office:
    build:
      context: ./repo/services/back-office
      dockerfile: Dockerfile
      # Pass Supabase public keys at build time (Next.js embeds NEXT_PUBLIC_* at build)
      args:
        - NEXT_PUBLIC_SUPABASE_URL=${NEXT_PUBLIC_SUPABASE_URL}
        - NEXT_PUBLIC_SUPABASE_PUBLISHABLE_DEFAULT_KEY=${NEXT_PUBLIC_SUPABASE_PUBLISHABLE_DEFAULT_KEY}
    container_name: back-office
    restart: unless-stopped
    extra_hosts:
      - "host.docker.internal:host-gateway"
    environment:
      - AI_HUB_URL=http://host.docker.internal:8084
      - AI_HUB_API_KEY=${AI_HUB_API_KEY}
    networks:
      - stocktracker
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://127.0.0.1:3000/back-office"]
      interval: 30s
      timeout: 3s
      retries: 3
      start_period: 30s

networks:
  stocktracker:
    driver: bridge

volumes:
  caddy-data:
  caddy-config:

