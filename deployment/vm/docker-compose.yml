# ===========================================
# Stock and Crypto Tracker - VM Deployment
# ===========================================
# This file is synced from the repo via CI/CD
# Do NOT edit directly on the VM
# ===========================================

x-logging: &default-logging
  driver: json-file
  options:
    max-size: "50m"
    max-file: "3"

services:
  # ===========================================
  # NOTE: CaddyManager removed - image not publicly accessible
  # Caddy Admin API available at localhost:2019 via SSH
  # ===========================================

  # ===========================================
  # Caddy - Reverse Proxy with Auto HTTPS
  # ===========================================
  caddy:
    image: caddy:2-alpine
    container_name: caddy
    restart: unless-stopped
    init: true
    mem_limit: 128m
    logging: *default-logging
    ports:
      - "80:80"
      - "443:443"
    environment:
      - CADDY_ADMIN=0.0.0.0:2019
    volumes:
      - ./Caddyfile:/etc/caddy/Caddyfile:ro
      - caddy-data:/data
      - caddy-config:/config
    networks:
      - stocktracker

  # ===========================================
  # n8n - Workflow Automation
  # Access at: / (root)
  # ===========================================
  n8n:
    image: n8nio/n8n:latest
    container_name: n8n
    restart: unless-stopped
    init: true
    mem_limit: 512m
    logging: *default-logging
    extra_hosts:
      - "host.docker.internal:host-gateway"
    environment:
      - N8N_HOST=0.0.0.0
      - N8N_PORT=5678
      - WEBHOOK_URL=https://nxserver.malaysiawest.cloudapp.azure.com
      - N8N_PROTOCOL=https
      - N8N_EDITOR_BASE_URL=https://nxserver.malaysiawest.cloudapp.azure.com
      - TZ=Asia/Singapore
      # Gateway 2.0 (TypeScript) access (Docker internal)
      - AI_HUB_URL=http://gateway-2.0:8080
      - AI_HUB_API_KEY=${AI_HUB_API_KEY}
    volumes:
      - ./n8n-data:/home/node/.n8n
    networks:
      - stocktracker
    depends_on:
      - gateway-2.0

  # ===========================================
  # Data Fetcher 2.0 - Centralized Multi-Provider Data Fetcher
  # Swagger at: /api/data-fetcher-2.0/swagger
  # Providers: Finnhub (fundamentals), Alpha Vantage (earnings calendar)
  # ===========================================
  data-fetcher-2.0:
    image: stocktracker-data-fetcher-2.0:${DATA_FETCHER_2_VERSION:-latest}
    build:
      context: ./repo/services
      dockerfile: workers/data-fetcher-2.0/Dockerfile
    container_name: data-fetcher-2.0
    restart: unless-stopped
    init: true
    mem_limit: 384m
    logging: *default-logging
    environment:
      - ASPNETCORE_ENVIRONMENT=Production
      - ASPNETCORE_URLS=http://+:8080
      # Path base for reverse proxy
      - PATH_BASE=/api/data-fetcher-2.0
      # Database connection (direct, bypasses pooler for best performance)
      - ConnectionStrings__DefaultConnection=${DATABASE_URL_DOTNET}
      # Finnhub Provider (stock fundamentals)
      - Providers__Finnhub__ApiKey=${FINNHUB_API_KEY}
      - Providers__Finnhub__BaseUrl=https://finnhub.io/api/v1
      - Providers__Finnhub__RateLimitDelayMs=2000
      # Alpha Vantage Provider (earnings calendar)
      - Providers__AlphaVantage__ApiKey=${ALPHA_VANTAGE_API_KEY}
      - Providers__AlphaVantage__BaseUrl=https://www.alphavantage.co
      - Providers__AlphaVantage__RateLimitDelayMs=12000
      - Providers__AlphaVantage__Horizon=6month
      # Massive Provider (technical indicators: SMA, EMA, MACD, RSI)
      - Providers__Massive__ApiKey=${MASSIVE_API_KEY}
      - Providers__Massive__BaseUrl=https://api.massive.com/v1
      - Providers__Massive__RateLimitDelayMs=12000
      - Providers__Massive__Timespan=minute
      - Providers__Massive__Limit=960
      - Providers__Massive__BackfillLimit=5000
      - Providers__Massive__BackfillDays=90
      # RabbitMQ connection (for Massive indicator queue)
      - RabbitMQ__HostName=rabbitmq
      - RabbitMQ__UserName=stocktracker
      - RabbitMQ__Password=${RABBITMQ_PASSWORD}
      - RabbitMQ__MassiveQueueName=massive-indicator-queue
      - RabbitMQ__BackfillQueueName=backfill-queue
      - RabbitMQ__CryptoBackfillQueueName=crypto-backfill-queue
      # Alpaca Provider (OHLCV market data: stocks + crypto)
      - Providers__Alpaca__ApiKeyId=${ALPACA_API_KEY_ID}
      - Providers__Alpaca__ApiSecretKey=${ALPACA_API_SECRET_KEY}
      - Providers__Alpaca__MarketDataBaseUrl=https://data.alpaca.markets
      - Providers__Alpaca__TradingApiBaseUrl=https://api.alpaca.markets
      - Providers__Alpaca__MonthsToBackfill=6
      - Providers__Alpaca__MaxBarsPerRequest=10000
      - Providers__Alpaca__StockTimeframe=15Min
      - Providers__Alpaca__CryptoTimeframe=15Min
      - Providers__Alpaca__StockFeed=sip
      - Providers__Alpaca__StockAdjustment=split
      - Providers__Alpaca__CryptoLoc=us
      - Providers__Alpaca__FetchIntervalMinutes=30
      - Providers__Alpaca__RateLimitThreshold=10
      # eToro Provider (multi-asset market data: non-US stocks, commodities, indices, wider crypto)
      - Providers__Etoro__BaseUrl=https://public-api.etoro.com
      # Note: Infisical values are swapped -- ETORO_API_KEY contains user-key and vice versa
      - Providers__Etoro__ApiKey=${ETORO_USER_KEY}
      - Providers__Etoro__UserKey=${ETORO_API_KEY}
      - Providers__Etoro__ConservativeRateLimitPerMinute=60
      - Providers__Etoro__MaxCandlesPerRequest=1000
      - Providers__Etoro__DefaultCandleInterval=FifteenMinutes
      - Providers__Etoro__BackfillCandleInterval=OneDay
      - Providers__Etoro__FetchIntervalMinutes=30
      # MarketAux Provider (news sentiment)
      - Providers__MarketAux__ApiKey=${MARKETAUX_API_KEY}
      - Providers__MarketAux__BaseUrl=https://api.marketaux.com/v1
      - Providers__MarketAux__DailyRequestBudget=80
      # GNews Provider (global/world/business headlines)
      - Providers__GNews__ApiKey=${GNEWS_API_KEY}
      - Providers__GNews__BaseUrl=https://gnews.io/api/v4
      - Providers__GNews__DailyRequestBudget=90
      # FRED Provider (economic indicators)
      - Providers__Fred__ApiKey=${FRED_API_KEY}
      - Providers__Fred__BaseUrl=https://api.stlouisfed.org
      - Providers__Fred__ScheduleTime=08:00
      - Providers__Fred__ScheduleTimezone=America/New_York
      # Gateway (price alert notifications)
      - Gateway__BaseUrl=http://gateway-2.0:8080
      - Gateway__InternalServiceKey=${INTERNAL_SERVICE_KEY}
      # Metrics service
      - MetricsService__BaseUrl=http://metrics:8080
      - MetricsService__WorkerName=data-fetcher-2.0
      - MetricsService__Enabled=true
    networks:
      stocktracker:
        aliases:
          - data-fetcher
    depends_on:
      gateway-2.0:
        condition: service_started
      metrics:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8080/health/live"]
      interval: 60s
      timeout: 5s
      retries: 3
      start_period: 30s

  # ===========================================
  # Metrics Service
  # Swagger at: /api/metrics/swagger
  # Prometheus metrics at: /metrics
  # ===========================================
  metrics:
    image: stocktracker-metrics:${METRICS_VERSION:-latest}
    build:
      context: ./repo/services
      dockerfile: metrics/StockTracker.Metrics/Dockerfile
    container_name: metrics
    restart: unless-stopped
    init: true
    mem_limit: 256m
    logging: *default-logging
    extra_hosts:
      - "host.docker.internal:host-gateway"
    environment:
      - ASPNETCORE_ENVIRONMENT=Production
      - ASPNETCORE_URLS=http://+:8080
      - PATH_BASE=/api/metrics
      # Gateway 2.0 (TypeScript) access (Docker internal)
      - AI_HUB_URL=http://gateway-2.0:8080
      - AI_HUB_API_KEY=${AI_HUB_API_KEY}
    networks:
      - stocktracker
    depends_on:
      - gateway-2.0
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8080/health/live"]
      interval: 60s
      timeout: 5s
      retries: 3
      start_period: 30s

  # ===========================================
  # Grafana Alloy - Metrics & Logs Forwarder
  # Scrapes local services and forwards to Grafana Cloud
  # ===========================================
  alloy:
    image: grafana/alloy:latest
    container_name: alloy
    restart: unless-stopped
    init: true
    mem_limit: 192m
    logging: *default-logging
    volumes:
      - ./alloy-config.alloy:/etc/alloy/config.alloy:ro
      # Host logs: journal (ai-hub) + weekly cleanup script logs
      - /var/log:/var/log:ro
      - /run/log/journal:/run/log/journal:ro
      - /etc/machine-id:/etc/machine-id:ro
    command:
      [
        "run",
        "/etc/alloy/config.alloy",
        "--server.http.listen-addr=0.0.0.0:12345",
      ]
    environment:
      - GRAFANA_CLOUD_API_KEY=${GRAFANA_CLOUD_API_KEY}
      # Loki user ID from Grafana Cloud > Connections > Loki
      - GRAFANA_CLOUD_LOKI_USER=${GRAFANA_CLOUD_LOKI_USER}
    networks:
      - stocktracker
    depends_on:
      - metrics

  # ===========================================
  # Redis - Caching for MCP Server & Queue Locks
  # ===========================================
  redis:
    image: redis:7-alpine
    container_name: redis
    restart: unless-stopped
    init: true
    mem_limit: 192m
    logging: *default-logging
    command: redis-server --appendonly yes --maxmemory 128mb --maxmemory-policy allkeys-lru
    volumes:
      - redis-data:/data
    networks:
      - stocktracker
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 3s
      retries: 3

  # ===========================================
  # RabbitMQ - Message Queue for Telegram Bot
  # Management UI at: localhost:15672 (internal)
  # ===========================================
  rabbitmq:
    image: rabbitmq:3-management-alpine
    container_name: rabbitmq
    restart: unless-stopped
    init: true
    mem_limit: 256m
    logging: *default-logging
    environment:
      - RABBITMQ_DEFAULT_USER=stocktracker
      - RABBITMQ_DEFAULT_PASS=${RABBITMQ_PASSWORD}
    volumes:
      - rabbitmq-data:/var/lib/rabbitmq
    networks:
      - stocktracker
    healthcheck:
      test: ["CMD", "rabbitmq-diagnostics", "-q", "ping"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s

  # ===========================================
  # PostgreSQL 17 - Self-hosted Database (migrated from Supabase)
  # Bound to VM loopback only (127.0.0.1:5432) for the alpha_tunnel SSH-forward
  # read-only review path. Public Azure interface remains closed.
  # pg_net extension compiled from source for trigger HTTP calls
  # ===========================================
  postgres:
    build: ./postgres
    image: stocktracker-postgres:latest
    container_name: postgres
    restart: unless-stopped
    init: true
    mem_limit: 512m
    logging: *default-logging
    command:
      - postgres
      - -c
      - shared_preload_libraries=pg_net
      - -c
      - pg_net.database_name=stocktracker
    environment:
      - POSTGRES_DB=stocktracker
      - POSTGRES_PASSWORD=${POSTGRES_PASSWORD}
      - INTERNAL_SERVICE_KEY=${INTERNAL_SERVICE_KEY}
    ports:
      - "127.0.0.1:5432:5432"
    volumes:
      - postgres-data:/var/lib/postgresql/data
      - postgres-backups:/backups
    networks:
      - stocktracker
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d stocktracker"]
      interval: 10s
      timeout: 3s
      retries: 5
      start_period: 30s

  # ===========================================
  # PostgREST - REST API for PostgreSQL (Supabase SDK compatibility)
  # Internal only (exposed via Caddy at /rest/v1/*)
  # ===========================================
  postgrest:
    image: postgrest/postgrest:v14.6
    container_name: postgrest
    restart: unless-stopped
    init: true
    mem_limit: 128m
    logging: *default-logging
    environment:
      - PGRST_DB_URI=postgresql://authenticator:${POSTGRES_PASSWORD}@postgres:5432/stocktracker
      - PGRST_DB_SCHEMAS=public
      - PGRST_DB_ANON_ROLE=anon
      - PGRST_JWT_SECRET=${POSTGREST_JWT_SECRET}
      - PGRST_DB_EXTRA_SEARCH_PATH=extensions
    networks:
      - stocktracker
    depends_on:
      postgres:
        condition: service_healthy

  # ===========================================
  # pgAdmin 4 - Database GUI
  # Access at: /pgadmin
  # ===========================================
  pgadmin:
    image: dpage/pgadmin4:9.13.0
    container_name: pgadmin
    restart: unless-stopped
    init: true
    mem_limit: 512m
    logging: *default-logging
    entrypoint: /bin/sh -c "echo \"postgres:5432:*:postgres:$$POSTGRES_PASSWORD\" > /tmp/pgpass && chmod 600 /tmp/pgpass && /entrypoint.sh"
    environment:
      - PGADMIN_DEFAULT_EMAIL=${PGADMIN_DEFAULT_EMAIL}
      - PGADMIN_DEFAULT_PASSWORD=${PGADMIN_DEFAULT_PASSWORD}
      - PGADMIN_SERVER_JSON_FILE=/pgadmin4/servers.json
      - POSTGRES_PASSWORD=${POSTGRES_PASSWORD}
      - SCRIPT_NAME=/pgadmin
    volumes:
      - pgadmin-data:/var/lib/pgadmin
      - ./pgadmin/servers.json:/pgadmin4/servers.json:ro
    networks:
      - stocktracker
    depends_on:
      postgres:
        condition: service_healthy

  # ===========================================
  # MCP Analysis Server - Read-only DB Queries for AI
  # Port: 8085 (internal, accessed by n8n)
  # ===========================================
  mcp-analysis:
    image: stocktracker-mcp-analysis:${MCP_ANALYSIS_VERSION:-latest}
    build:
      context: ./repo/services/mcp
      dockerfile: Dockerfile
    container_name: mcp-analysis
    restart: unless-stopped
    init: true
    mem_limit: 1536m
    logging: *default-logging
    environment:
      - DATABASE_URL_PYTHON=${DATABASE_URL_PYTHON}
      - MCP_PORT=8085
      - REDIS_HOST=redis
      - REDIS_PORT=6379
    ports:
      - "8085:8085"
    networks:
      - stocktracker
    depends_on:
      - redis
    healthcheck:
      test:
        [
          "CMD",
          "python",
          "-c",
          "import socket; s=socket.socket(); s.settimeout(2); s.connect(('localhost',8085)); s.close()",
        ]
      interval: 60s
      timeout: 5s
      retries: 5
      start_period: 30s

  # ===========================================
  # Gateway 2.0 - TypeScript AI Gateway (replaces gateway + ai-hub2 + telegram-bot-2.0)
  # Self-contained: cursor-agent + agent-context + tier-homes baked in
  # Port: 8083 (external), 8080 (internal)
  # ===========================================
  gateway-2.0:
    image: stocktracker-gateway-2.0:${GATEWAY_2_VERSION:-latest}
    build:
      context: ./repo/services/ai/gateway-2.0
      dockerfile: Dockerfile
    container_name: gateway-2.0
    restart: unless-stopped
    init: true
    mem_limit: 768m
    logging: *default-logging
    ports:
      - "8083:8080"
    environment:
      - PORT=8080
      - AI_HUB_API_KEY=${AI_HUB_API_KEY}
      - GATEWAY_DEFAULT_MODEL=claude-4.5-sonnet
      - GATEWAY_CONTEXT_PATH=/app/agent-context
      - GATEWAY_TIER_HOMES_PATH=/app/tier-homes
      - DATABASE_URL=${DATABASE_URL_GO}
      - REDIS_URL=redis://redis:6379
      - TELEGRAM_BOT_TOKEN=${TELEGRAM_BOT_TOKEN}
      - TELEGRAM_WEBHOOK_URL=https://nxserver.malaysiawest.cloudapp.azure.com/telegram/webhook
      - TELEGRAM_ERROR_CHAT_ID=${TELEGRAM_ERROR_CHAT_ID}
      - DATA_FETCHER_INTERNAL_URL=http://data-fetcher:8080
      - PATH=/home/azureuser/.local/bin:/usr/local/sbin:/usr/local/bin:/usr/sbin:/usr/bin:/sbin:/bin
      - CURSOR_API_KEY=${CURSOR_API_KEY}
      - PHONE_HASH_SALT=${PHONE_HASH_SALT}
      - FRONTEND_URL=${FRONTEND_URL:-https://stockandcryptotracker.com}
      - INTERNAL_SERVICE_KEY=${INTERNAL_SERVICE_KEY}
      - CURATOR_MODEL=${CURATOR_MODEL:-claude-4.6-sonnet-medium-thinking}
      # Memory curator: sequential batches (default true) reduces parallel cursor-agent failures
      - CURATOR_SEQUENTIAL_BATCHES=${CURATOR_SEQUENTIAL_BATCHES:-true}
      - CURATOR_VERBOSE_LOGS=${CURATOR_VERBOSE_LOGS:-false}
      - CURATOR_TELEGRAM_ERROR_MAX_CHARS=${CURATOR_TELEGRAM_ERROR_MAX_CHARS:-2000}
      # Optional: raise timeout (ms) if batches hit Curator LLM call timed out; max 900000
      - CURATOR_LLM_TIMEOUT_MS=${CURATOR_LLM_TIMEOUT_MS:-360000}
      # Optional: fewer stories per run reduces prompt size and failure rate
      - CURATOR_MAX_STORIES=${CURATOR_MAX_STORIES:-25}
      - CURATOR_MAX_STORIES_PER_BATCH=${CURATOR_MAX_STORIES_PER_BATCH:-10}
      - RABBITMQ_URL=amqp://stocktracker:${RABBITMQ_PASSWORD}@rabbitmq:5672
      - OVERVIEW_ALLOWED_USERS=${OVERVIEW_ALLOWED_USERS:-}
    volumes:
      # cursor-agent CLI: mount the entire versions dir (contains node binary + JS chunks)
      # The bash wrapper script resolves SCRIPT_DIR via realpath, so the directory containing
      # the script must also contain 'node', 'index.js', etc.
      - /home/azureuser/.local/share/cursor-agent:/home/azureuser/.local/share/cursor-agent:ro
      # cursor-agent OAuth token (rw — agent refreshes tokens during execution)
      - /home/azureuser/.config/cursor:/root/.config/cursor:rw
    networks:
      - stocktracker
    depends_on:
      - redis
      - rabbitmq
    healthcheck:
      test: ["CMD", "curl", "-sf", "http://localhost:8080/health/live"]
      interval: 60s
      timeout: 5s
      retries: 3
      start_period: 20s

  # ===========================================
  # Back Office - Admin & Testing UI
  # Access at: /back-office
  # ===========================================
  back-office:
    image: stocktracker-back-office:${BACK_OFFICE_VERSION:-latest}
    build:
      context: ./repo/services/back-office
      dockerfile: Dockerfile
    container_name: back-office
    restart: unless-stopped
    init: true
    mem_limit: 256m
    logging: *default-logging
    extra_hosts:
      - "host.docker.internal:host-gateway"
    environment:
      # Gateway 2.0 (TypeScript) access (Docker internal)
      - AI_HUB_URL=http://gateway-2.0:8080
      - AI_HUB_API_KEY=${AI_HUB_API_KEY}
      # Database REST API (PostgREST, service role key)
      - DATABASE_URL_JS=${DATABASE_URL_JS}
      - DATABASE_SERVICE_ROLE_KEY=${DATABASE_SERVICE_ROLE_KEY}
      # Redis (VM local)
      - REDIS_URL=redis://redis:6379
      # RabbitMQ Management API (for monitoring)
      - RABBITMQ_MANAGEMENT_URL=http://rabbitmq:15672
      - RABBITMQ_PASSWORD=${RABBITMQ_PASSWORD}
    networks:
      - stocktracker
    depends_on:
      - gateway-2.0
      - redis
      - rabbitmq
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://127.0.0.1:3000/back-office"]
      interval: 60s
      timeout: 5s
      retries: 3
      start_period: 30s

  # NOTE: Frontend is deployed via Vercel, not on VM

  # ===========================================
  # Freshness Check - Build-only (runs via host cron, not as a long-lived service)
  # ===========================================
  freshness-check:
    image: stocktracker-freshness-check:latest
    build:
      context: ./repo/scripts/freshness-check
      dockerfile: Dockerfile
    profiles:
      - tools
    networks:
      - stocktracker

networks:
  stocktracker:
    driver: bridge
    enable_ipv6: true
    ipam:
      config:
        - subnet: 172.18.0.0/16
        - subnet: fd00:db8:2::/64

volumes:
  caddy-data:
  caddy-config:
  redis-data:
  rabbitmq-data:
  postgres-data:
  postgres-backups:
  pgadmin-data:
