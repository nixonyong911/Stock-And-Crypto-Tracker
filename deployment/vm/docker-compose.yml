  #   networks:
  #     - stocktracker

  # ===========================================
  # AI Hub - DISABLED (Phase 2 - needs API keys)
  # Docs at: /api/ai-hub/docs
  # ===========================================
  # ai-hub:
  #   build:
  #     context: ./repo/services/ai/ai-hub
  #     dockerfile: Dockerfile
  #   container_name: ai-hub
  #   restart: unless-stopped
  #   environment:
  #     - DATABASE_URL=${DATABASE_CONNECTION_STRING}
  #     - AI_KEY_API_STOCKANDCRYPTOTRACKER_GOOGLE_GEMINI_3_FLASH=${AI_KEY_API_STOCKANDCRYPTOTRACKER_GOOGLE_GEMINI_3_FLASH:-}
  #     - GOOGLE_CLOUD_PROJECT_ID=${GOOGLE_CLOUD_PROJECT_ID:-default-project}
  #   networks:
