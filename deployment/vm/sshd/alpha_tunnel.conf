# ===========================================
# Alpha Tunnel — sshd Match block (defence-in-depth)
# ===========================================
# Restricts the alpha_tunnel system user to:
#   - SSH-based local TCP port forwarding ONLY to 127.0.0.1:5432
#   - No shell, no agent/X11/stream-local forwarding, no tunnels
#   - Idle keepalive so abandoned tunnels don't pile up
#
# Paired with the per-key restrictions in
# /home/alpha_tunnel/.ssh/authorized_keys (`restrict,permitopen=...,command=...`).
# Either layer alone would deny shell/extra forwards; together they survive
# accidental misedits to one of them.
#
# Installed by deployment/vm/scripts/setup-alpha-tunnel.sh into
# /etc/ssh/sshd_config.d/alpha_tunnel.conf
# ===========================================

Match User alpha_tunnel
    AllowTcpForwarding local
    PermitOpen 127.0.0.1:5432
    PermitTunnel no
    AllowAgentForwarding no
    X11Forwarding no
    GatewayPorts no
    AllowStreamLocalForwarding no
    PermitTTY no
    ForceCommand /usr/sbin/nologin
    ClientAliveInterval 30
    ClientAliveCountMax 4
